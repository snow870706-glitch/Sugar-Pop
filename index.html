<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Sugar Pop Match Demo</title>
  <style>
    :root {
      --ink: #5a2d61;
      --panel: rgba(255, 255, 255, 0.78);
      --cell: clamp(38px, 8.4vw, 68px);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 216, 77, 0.86) 0 18px, transparent 19px),
        radial-gradient(circle at 86% 17%, rgba(110, 216, 255, 0.78) 0 25px, transparent 26px),
        radial-gradient(circle at 78% 83%, rgba(255, 111, 177, 0.78) 0 23px, transparent 24px),
        linear-gradient(160deg, #fff2b8 0%, #ffc3df 44%, #b7efff 100%);
      overflow: hidden;
      user-select: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.34) 0 9px, transparent 9px 26px),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.62), transparent 48%);
      opacity: 0.52;
    }

    body.free-stage {
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.92) 0 14px, transparent 15px),
        radial-gradient(circle at 82% 20%, rgba(255, 216, 77, 0.9) 0 22px, transparent 23px),
        radial-gradient(circle at 76% 82%, rgba(87, 224, 181, 0.78) 0 28px, transparent 29px),
        linear-gradient(160deg, #4b169f 0%, #006f9d 50%, #22a976 100%);
      color: #fff;
    }

    body.free-stage::before {
      background-image:
        repeating-linear-gradient(135deg, rgba(255,255,255,0.18) 0 8px, transparent 8px 22px),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.38), transparent 42%);
      opacity: 0.78;
    }

    .free-transition {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      pointer-events: none;
      background:
        radial-gradient(circle, rgba(255,255,255,0.96) 0 8%, rgba(255,216,77,0.92) 9% 24%, rgba(155,92,255,0.88) 25% 48%, rgba(0,111,157,0.92) 49% 100%);
      color: white;
      font-size: clamp(36px, 12vw, 72px);
      font-weight: 1000;
      text-shadow: 0 4px 0 rgba(71, 22, 120, 0.38), 0 0 26px rgba(255,255,255,0.8);
    }

    .free-transition.show {
      display: grid;
      animation: free-wipe 1280ms ease both;
    }

    .app {
      position: relative;
      width: min(100%, 560px);
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 12px;
      overflow: hidden;
    }

    .bet-screen {
      align-self: center;
      display: grid;
      gap: 18px;
      padding: 22px 18px;
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgba(99, 44, 114, 0.26), inset 0 -6px 0 rgba(255, 128, 184, 0.18);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .bet-screen-title {
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1;
      font-weight: 1000;
      color: var(--ink);
      text-shadow: 0 3px 0 white;
    }

    .bet-screen-sub {
      font-size: 13px;
      font-weight: 900;
      color: #9d4f7c;
    }

    .menu-balance {
      width: min(100%, 300px);
      min-height: 64px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      box-shadow: inset 0 3px 0 rgba(255,255,255,0.78), inset 0 -5px 0 rgba(87,224,181,0.16);
    }

    .menu-balance .label {
      color: #2e9b7d;
    }

    .menu-balance-value {
      margin-top: 2px;
      font-size: clamp(24px, 7vw, 36px);
      line-height: 1;
      font-weight: 1000;
      color: #16845b;
      text-shadow: 0 2px 0 white;
    }

    .bet-picker {
      width: min(100%, 300px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      gap: 10px;
      align-items: center;
    }

    .bet-picker-value {
      min-height: 76px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: rgba(255,255,255,0.68);
      box-shadow: inset 0 3px 0 rgba(255,255,255,0.75), inset 0 -5px 0 rgba(255,128,184,0.14);
      font-size: clamp(28px, 9vw, 42px);
      font-weight: 1000;
      color: #6f3ab8;
      text-shadow: 0 2px 0 white;
    }

    .start-btn {
      width: min(100%, 300px);
      min-height: 58px;
      margin: 0 auto;
      border: 0;
      border-radius: 22px;
      cursor: pointer;
      font: inherit;
      font-size: 20px;
      font-weight: 1000;
      color: white;
      background: linear-gradient(145deg, #57e0b5, #22a976 55%, #16845b);
      text-shadow: 0 2px 0 rgba(0,0,0,0.14);
      box-shadow: inset 0 4px 0 rgba(255,255,255,0.36), 0 10px 16px rgba(54, 127, 105, 0.24);
      transition: transform 140ms ease, filter 140ms ease;
    }

    .start-btn:disabled {
      cursor: not-allowed;
      filter: grayscale(0.45) brightness(0.9);
      opacity: 0.58;
    }

    .app.in-round .bet-screen { display: none; }
    .app:not(.in-round) .topbar,
    .app:not(.in-round) .jar-panel,
    .app:not(.in-round) .board-wrap,
    .app:not(.in-round) .controls { display: none; }

    .topbar,
    .jar-panel,
    .controls {
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(139, 65, 117, 0.22), inset 0 -4px 0 rgba(255, 128, 184, 0.18);
      backdrop-filter: blur(8px);
    }

    .topbar {
      min-height: 84px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-items: center;
    }

    .stat { min-width: 0; text-align: center; }

    .jar-panel {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .jar-icon {
      position: relative;
      width: 54px;
      height: 66px;
      border: 4px solid rgba(255,255,255,0.9);
      border-radius: 18px 18px 22px 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.28)),
        linear-gradient(180deg, #ffd84d 0%, #ff8ec8 58%, #6ed8ff 100%);
      box-shadow: inset 0 -8px 0 rgba(127, 45, 118, 0.15), 0 8px 18px rgba(99, 44, 114, 0.22);
      overflow: hidden;
    }

    .jar-icon::before {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: -7px;
      height: 14px;
      border-radius: 999px;
      background: #8f4ed8;
      box-shadow: inset 0 3px 0 rgba(255,255,255,0.42);
    }

    .jar-icon::after {
      content: "";
      position: absolute;
      inset: 10px 12px auto auto;
      width: 12px;
      height: 28px;
      border-radius: 999px;
      background: rgba(255,255,255,0.46);
      transform: rotate(16deg);
    }

    .jar-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--jar-fill, 0%);
      background:
        radial-gradient(circle at 18% 18%, #fff 0 3px, transparent 4px),
        radial-gradient(circle at 70% 28%, #fff 0 2px, transparent 3px),
        linear-gradient(180deg, #ff4d9d, #ffba3d);
      transition: height 360ms cubic-bezier(.2,.86,.2,1);
    }

    .jar-main { min-width: 0; }

    .jar-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }

    .jar-title {
      font-size: 14px;
      font-weight: 1000;
      color: var(--ink);
      text-shadow: 0 1px 0 white;
    }

    .jar-progress-text {
      font-size: 12px;
      font-weight: 900;
      color: #9d4f7c;
      white-space: nowrap;
    }

    .jar-track {
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.66);
      box-shadow: inset 0 2px 5px rgba(91, 42, 100, 0.18);
      overflow: hidden;
    }

    .jar-bar {
      width: var(--jar-width, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff4d9d, #ffd84d, #57e0b5);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.5), 0 0 14px rgba(255, 111, 177, 0.46);
      transition: width 360ms cubic-bezier(.2,.86,.2,1);
    }

    .jar-reward {
      min-width: 78px;
      text-align: right;
      font-size: 12px;
      font-weight: 1000;
      color: #6f3ab8;
      text-shadow: 0 1px 0 white;
    }

    .jar-panel.ready {
      animation: jar-ready 780ms ease both;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.62), 0 0 30px rgba(255, 216, 77, 0.72);
    }

    .missions-panel {
      grid-column: 1 / -1;
      display: grid;
      gap: 9px;
    }

    .mission-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .mission-title {
      font-size: 15px;
      font-weight: 1000;
      color: var(--ink);
      text-shadow: 0 1px 0 white;
    }

    .mission-status {
      font-size: 12px;
      font-weight: 1000;
      color: #16845b;
      text-align: right;
      text-shadow: 0 1px 0 white;
    }

    .mission-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .mission-card {
      min-height: 78px;
      padding: 9px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.66);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.75), inset 0 -4px 0 rgba(255,128,184,0.12);
      text-align: left;
    }

    .mission-card.jackpot {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.78), rgba(255,244,170,0.88)),
        linear-gradient(145deg, #ffd84d, #ff8ec8);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.86), 0 0 18px rgba(255, 216, 77, 0.55);
    }

    .mission-name {
      font-size: 12px;
      font-weight: 1000;
      line-height: 1.18;
      color: var(--ink);
    }

    .mission-progress {
      margin-top: 7px;
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      overflow: hidden;
      box-shadow: inset 0 1px 4px rgba(91, 42, 100, 0.18);
    }

    .mission-fill {
      width: var(--mission-fill, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #57e0b5, #ffd84d, #ff6fb1);
      transition: width 260ms ease;
    }

    .mission-reward {
      margin-top: 5px;
      font-size: 11px;
      font-weight: 1000;
      color: #6f3ab8;
    }

    .free-status {
      font-size: 11px;
      color: #9d4f7c;
      font-weight: 1000;
    }

    .label {
      font-size: 11px;
      font-weight: 900;
      color: #9d4f7c;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .value {
      margin-top: 3px;
      font-size: clamp(18px, 5vw, 28px);
      line-height: 1;
      font-weight: 1000;
      color: var(--ink);
      text-shadow: 0 2px 0 white;
    }

    .board-wrap {
      align-self: center;
      display: grid;
      place-items: center;
      padding: 12px 0;
    }

    .board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(7, var(--cell));
      grid-template-rows: repeat(7, var(--cell));
      gap: clamp(5px, 1.4vw, 8px);
      padding: clamp(10px, 2.8vw, 16px);
      border: 5px solid #ff86c3;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.64), rgba(255,232,247,0.84)),
        repeating-linear-gradient(90deg, rgba(255,160,210,0.24) 0 16px, rgba(255,255,255,0.16) 16px 32px);
      box-shadow:
        0 18px 40px rgba(99, 44, 114, 0.28),
        inset 0 0 0 4px rgba(255,255,255,0.46),
        inset 0 -10px 0 rgba(196, 73, 160, 0.12);
      touch-action: manipulation;
    }

    .cell {
      position: relative;
      border: 0;
      padding: 0;
      border-radius: 19px;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.7);
      cursor: pointer;
      transition: transform 170ms ease, filter 170ms ease, box-shadow 170ms ease;
    }

    .cell:hover { transform: translateY(-2px); filter: brightness(1.05); }

    .cell.selected {
      outline: 4px solid white;
      box-shadow: 0 0 0 5px #ff3f8f, 0 0 24px rgba(255, 63, 143, 0.78);
      z-index: 3;
    }

    .cell.hint {
      outline: 0;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.78), 0 0 24px rgba(255, 216, 77, 0.9);
      z-index: 2;
    }

    .cell.hint .candy {
      animation: hint-hop 760ms ease-in-out infinite;
      filter: brightness(1.12) saturate(1.2);
    }

    .cell.swapping .candy { animation: swap-bounce 220ms ease both; }
    .cell.clearing .candy { animation: candy-clear 260ms ease forwards; }
    .cell.entering .candy { animation: candy-enter 320ms cubic-bezier(.18,.92,.22,1.15) both; }
    .cell.settling .candy { animation: candy-settle 240ms ease both; }

    .cell.blast-h::after,
    .cell.blast-v::after,
    .cell.blast-burst::after,
    .cell.blast-color::after,
    .cell.blast-h::before,
    .cell.blast-v::before,
    .cell.blast-burst::before,
    .cell.blast-color::before,
    .cell.color-charge::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 4;
    }

    .cell.blast-h::after {
      left: -9px;
      right: -9px;
      top: 44%;
      height: 16%;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.96), #6ed8ff, rgba(255,255,255,0.96), transparent);
      box-shadow: 0 0 22px rgba(110, 216, 255, 0.98), 0 0 42px rgba(255,255,255,0.72);
      animation: beam-h 560ms cubic-bezier(.18,.92,.22,1) both;
    }

    .cell.blast-h::before {
      left: -4px;
      right: -4px;
      top: 30%;
      height: 40%;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.38), transparent);
      animation: beam-glow-h 620ms ease both;
    }

    .cell.blast-v::after {
      top: -9px;
      bottom: -9px;
      left: 44%;
      width: 16%;
      border-radius: 999px;
      background: linear-gradient(0deg, transparent, rgba(255,255,255,0.96), #ff6fb1, rgba(255,255,255,0.96), transparent);
      box-shadow: 0 0 22px rgba(255, 111, 177, 0.98), 0 0 42px rgba(255,255,255,0.72);
      animation: beam-v 560ms cubic-bezier(.18,.92,.22,1) both;
    }

    .cell.blast-v::before {
      top: -4px;
      bottom: -4px;
      left: 30%;
      width: 40%;
      border-radius: 999px;
      background: linear-gradient(0deg, transparent, rgba(255,255,255,0.38), transparent);
      animation: beam-glow-v 620ms ease both;
    }

    .cell.blast-burst::after {
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0 18%, rgba(255,216,77,0.88) 19% 38%, rgba(255,63,143,0.5) 39% 58%, transparent 60%);
      animation: burst-ring 660ms ease both;
    }

    .cell.blast-burst::before {
      inset: -18px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.72) 0 12%, rgba(255,216,77,0.42) 13% 34%, rgba(255,63,143,0.24) 35% 52%, transparent 54%);
      animation: burst-pulse 760ms ease both;
    }

    .cell.blast-color::after {
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(#ff4d6d, #ffd84d, #57e0b5, #6ed8ff, #9b5cff, #ff4d6d);
      opacity: 0.9;
      mix-blend-mode: screen;
      animation: color-sweep 720ms ease both;
    }

    .cell.blast-color::before {
      inset: -15px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.7);
      box-shadow: 0 0 20px rgba(255,255,255,0.7), 0 0 32px rgba(155,92,255,0.58);
      animation: color-orbit 760ms ease both;
    }

    .cell.color-charge::after {
      inset: -5px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.95) 0 18%, transparent 19%),
        conic-gradient(#ff4d6d, #ffd84d, #57e0b5, #6ed8ff, #9b5cff, #ff4d6d);
      opacity: 0;
      box-shadow: 0 0 18px rgba(255,255,255,0.9);
      animation: color-charge 720ms ease both;
    }

    .candy {
      --shape-transform: scale(1);
      --candy-shadow: rgba(93, 40, 102, 0.22);
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      pointer-events: none;
      transform: var(--shape-transform);
      transform-origin: 50% 58%;
      box-shadow:
        inset 0 7px 0 rgba(255,255,255,0.42),
        inset 0 -9px 0 rgba(0,0,0,0.13),
        inset 0 0 0 3px rgba(255,255,255,0.2),
        0 7px 13px var(--candy-shadow);
      overflow: hidden;
    }

    .candy::before {
      content: "";
      position: absolute;
      inset: 7% 12% 58% 12%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.18));
      transform: rotate(-12deg);
    }

    .candy::after {
      content: "";
      position: absolute;
      width: 20%;
      height: 14%;
      left: 22%;
      top: 18%;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      box-shadow: 10px 5px 16px rgba(255,255,255,0.28);
      transform: rotate(-18deg);
    }

    .type-0 {
      border-radius: 50%;
      background:
        radial-gradient(circle at 33% 24%, #ffd5e2 0 10%, transparent 11%),
        radial-gradient(circle at 68% 74%, rgba(172,0,54,0.22) 0 18%, transparent 19%),
        linear-gradient(145deg, #ff5f8b, #f5144f 58%, #b90036);
    }

    .type-1 {
      border-radius: 15px;
      background:
        radial-gradient(circle at 30% 22%, #d9ffe9 0 11%, transparent 12%),
        linear-gradient(145deg, #3ff09a, #00bd64 56%, #007f41);
    }

    .type-1::before {
      inset: 10% 14% 62% 14%;
      border-radius: 12px;
    }

    .type-2 {
      border-radius: 24px 18px 24px 18px;
      clip-path: none;
      background:
        radial-gradient(circle at 32% 22%, #fff8bd 0 11%, transparent 12%),
        linear-gradient(145deg, #ffe93c, #ffbd00 58%, #e27a00);
    }

    .type-3 {
      border-radius: 44% 56% 52% 48% / 58% 48% 52% 42%;
      background:
        radial-gradient(circle at 34% 23%, #d7fbff 0 10%, transparent 11%),
        linear-gradient(145deg, #37dfff, #009fd1 55%, #006f9d);
    }

    .type-4 {
      border-radius: 24px 14px 24px 14px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.88) 0 10%, transparent 10% 90%, rgba(255,255,255,0.88) 90%),
        radial-gradient(circle at 34% 24%, #ffe4b8 0 10%, transparent 11%),
        linear-gradient(145deg, #ffb02e, #ff6b00 58%, #c54500);
    }

    .type-4::before {
      inset: 12% 20% 60% 20%;
      border-radius: 999px;
    }

    .type-5 {
      border-radius: 18px;
      clip-path: none;
      background:
        radial-gradient(circle at 33% 22%, #ead9ff 0 10%, transparent 11%),
        linear-gradient(145deg, #a65cff, #7134e0 58%, #4b169f);
    }

    .special-striped-h,
    .special-striped-v,
    .special-wrapped,
    .special-color {
      box-shadow:
        inset 0 6px 0 rgba(255,255,255,0.48),
        inset 0 -7px 0 rgba(0,0,0,0.13),
        0 0 0 3px rgba(255,255,255,0.62),
        0 7px 14px rgba(93, 40, 102, 0.26);
    }

    .special-striped-h,
    .special-striped-v {
      outline: 3px solid rgba(255,255,255,0.72);
    }

    .special-striped-h::before,
    .special-striped-v::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: inherit;
      background:
        repeating-linear-gradient(0deg,
          rgba(255,255,255,0.92) 0 4px,
          rgba(255,255,255,0.92) 4px,
          transparent 5px,
          transparent 11px);
      opacity: 0.78;
      mix-blend-mode: screen;
    }

    .special-striped-v::before {
      background:
        repeating-linear-gradient(90deg,
          rgba(255,255,255,0.92) 0 4px,
          rgba(255,255,255,0.92) 4px,
          transparent 5px,
          transparent 11px);
    }

    .special-striped-h::after,
    .special-striped-v::after {
      content: "";
      position: absolute;
      inset: 20% 39%;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 0 10px rgba(255,255,255,0.82);
      transform: none;
    }

    .special-striped-v::after {
      inset: 39% 20%;
    }

    .special-wrapped::before {
      content: "";
      position: absolute;
      left: -7%;
      right: -7%;
      top: 24%;
      bottom: 24%;
      border-radius: 45% 55% 52% 48% / 58% 42% 58% 42%;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.9) 0 10%, rgba(255,216,77,0.82) 11% 19%, rgba(255,255,255,0.26) 20% 80%, rgba(255,216,77,0.82) 81% 89%, rgba(255,255,255,0.9) 90%),
        radial-gradient(ellipse at 50% 45%, rgba(255,244,170,0.9), rgba(255,111,177,0.5) 58%, rgba(91,42,100,0.24) 100%);
      box-shadow: inset 0 4px 0 rgba(255,255,255,0.58), inset 0 -7px 0 rgba(82,31,95,0.2), 0 0 0 2px rgba(255,255,255,0.65);
      opacity: 1;
      transform: none;
    }

    .special-wrapped::after {
      width: auto;
      height: auto;
      left: 18%;
      right: 18%;
      top: 16%;
      bottom: 16%;
      border-radius: 38% 62% 45% 55% / 58% 48% 52% 42%;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.95) 0 14%, rgba(255,255,255,0.18) 15% 42%, rgba(255,216,77,0.62) 43% 56%, rgba(255,255,255,0.12) 57%),
        repeating-linear-gradient(115deg, rgba(255,255,255,0.62) 0 4px, rgba(255,111,177,0.34) 4px 9px, transparent 9px 14px);
      outline: 2px solid rgba(255,255,255,0.78);
      box-shadow: 0 0 13px rgba(255,216,77,0.65), inset 0 -5px 0 rgba(82,31,95,0.13);
      transform: rotate(-6deg);
    }

    .special-free {
      --shape-transform: scale(0.94);
      border-radius: 16px 16px 20px 20px;
      clip-path: none;
      background:
        radial-gradient(circle at 34% 58%, #ff4d6d 0 8%, transparent 9%),
        radial-gradient(circle at 58% 46%, #ffd84d 0 9%, transparent 10%),
        radial-gradient(circle at 63% 68%, #57e0b5 0 8%, transparent 9%),
        linear-gradient(145deg, rgba(255,255,255,0.92), rgba(110,216,255,0.44) 48%, rgba(155,92,255,0.38));
      box-shadow:
        inset 0 6px 0 rgba(255,255,255,0.72),
        inset 0 -8px 0 rgba(80,39,129,0.2),
        0 0 0 3px rgba(255,255,255,0.82),
        0 0 18px rgba(110,216,255,0.72);
    }

    .special-free::before {
      content: "";
      position: absolute;
      left: 16%;
      right: 16%;
      top: -2%;
      height: 22%;
      border-radius: 9px 9px 5px 5px;
      background: linear-gradient(145deg, #9b5cff, #5f35b7);
      box-shadow: inset 0 3px 0 rgba(255,255,255,0.45), 0 2px 0 rgba(255,255,255,0.65);
      transform: none;
    }

    .special-free::after {
      content: "";
      position: absolute;
      left: 20%;
      top: 28%;
      width: 18%;
      height: 45%;
      border-radius: 999px;
      background: rgba(255,255,255,0.58);
      box-shadow: 18px -2px 12px rgba(255,255,255,0.22);
      transform: rotate(10deg);

    .cell.free-collect .candy {
      animation: free-collect 780ms ease both;
    }

    .special-color {
      --shape-transform: scale(1);

      background:
        radial-gradient(circle at 32% 24%, white 0 8%, transparent 9%),
        conic-gradient(#ff4d6d, #ffd84d, #57e0b5, #6ed8ff, #9b5cff, #ff4d6d);
    }

    .controls {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto 1fr 1fr;
      gap: 10px;
      align-items: center;
    }

    .betbox {
      display: grid;

    .round-btn,

    .round-btn {

      height: 40px;

      font-size: 22px;

    .bet-picker .round-btn {
      width: 52px;
      height: 52px;
      font-size: 28px;
    }

    .round-btn:disabled {
      cursor: not-allowed;
      filter: grayscale(0.5) brightness(0.92);

    .app.in-round .controls .betbox {

    .app.in-round .controls .betbox .round-btn { display: none; }

    .claim-btn {

    .round-btn:active,

    .toast {

    }

    .score-pop {

      min-width: 62px;
      padding: 5px 9px;
      border-radius: 999px;
      text-align: center;
      font-size: 14px;
      font-weight: 1000;
      color: white;

    }

    .score-pop.combo {
      min-width: 82px;
      background: linear-gradient(145deg, #7d35ff, #00d69a);

      animation-delay: 80ms;
    }

    @keyframes swap-bounce {
      0% { transform: var(--shape-transform) scale(1); }
      50% { transform: var(--shape-transform) scale(0.86) rotate(4deg); }
      100% { transform: var(--shape-transform) scale(1); }
    }

    @keyframes candy-clear {
      0% { opacity: 1; transform: var(--shape-transform) scale(1) rotate(0); filter: brightness(1); }
      60% { opacity: 1; transform: var(--shape-transform) scale(1.18) rotate(8deg); filter: brightness(1.2); }
      100% { opacity: 0; transform: var(--shape-transform) scale(0.15) rotate(18deg); filter: brightness(1.4); }
    }

    @keyframes candy-enter {
      0% { opacity: 0; transform: translateY(-28px) var(--shape-transform) scale(0.55); }
      70% { opacity: 1; transform: translateY(4px) var(--shape-transform) scale(1.06); }
      100% { opacity: 1; transform: translateY(0) var(--shape-transform) scale(1); }
    }

    @keyframes candy-settle {
      0% { transform: translateY(-10px) var(--shape-transform) scale(0.98); }
      70% { transform: translateY(3px) var(--shape-transform) scale(1.02); }
      100% { transform: translateY(0) var(--shape-transform) scale(1); }
    }

    @keyframes beam-h {
      0% { opacity: 0; transform: scaleX(0.2); }
      45% { opacity: 1; transform: scaleX(1.2); }
      100% { opacity: 0; transform: scaleX(1.55); }
    }

    @keyframes beam-v {
      0% { opacity: 0; transform: scaleY(0.2); }
      45% { opacity: 1; transform: scaleY(1.2); }
      100% { opacity: 0; transform: scaleY(1.55); }
    }

    @keyframes beam-glow-h {
      0% { opacity: 0; transform: scaleX(0.15); filter: blur(0); }
      42% { opacity: 0.9; transform: scaleX(1.35); filter: blur(2px); }
      100% { opacity: 0; transform: scaleX(1.9); filter: blur(5px); }
    }

    @keyframes beam-glow-v {
      0% { opacity: 0; transform: scaleY(0.15); filter: blur(0); }
      42% { opacity: 0.9; transform: scaleY(1.35); filter: blur(2px); }
      100% { opacity: 0; transform: scaleY(1.9); filter: blur(5px); }
    }

    @keyframes burst-ring {
      0% { opacity: 0; transform: scale(0.25); }
      45% { opacity: 1; transform: scale(0.95); }
      100% { opacity: 0; transform: scale(1.45); }
    }

    @keyframes burst-pulse {
      0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
      35% { opacity: 0.95; transform: scale(0.9) rotate(20deg); }
      68% { opacity: 0.62; transform: scale(1.28) rotate(-12deg); }
      100% { opacity: 0; transform: scale(1.72) rotate(0deg); }
    }

    @keyframes color-sweep {
      0% { opacity: 0; transform: rotate(0deg) scale(0.35); }
      45% { opacity: 0.95; transform: rotate(160deg) scale(1.12); }
      100% { opacity: 0; transform: rotate(320deg) scale(1.45); }
    }

    @keyframes color-orbit {
      0% { opacity: 0; transform: rotate(0deg) scale(0.28); }
      34% { opacity: 1; transform: rotate(120deg) scale(1); }
      70% { opacity: 0.82; transform: rotate(270deg) scale(1.22); }
      100% { opacity: 0; transform: rotate(460deg) scale(1.55); }
    }

    @keyframes color-charge {
      0% { opacity: 0; transform: rotate(0deg) scale(0.2); }
      35% { opacity: 0.95; transform: rotate(120deg) scale(1.05); }
      70% { opacity: 0.75; transform: rotate(250deg) scale(0.9); }
      100% { opacity: 0; transform: rotate(360deg) scale(1.3); }
    }

    @keyframes score-pop {
      0% { opacity: 0; transform: translate(-50%, 4px) scale(0.7); }
      22% { opacity: 1; transform: translate(-50%, -8px) scale(1.08); }
      74% { opacity: 1; transform: translate(-50%, -22px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -38px) scale(0.92); }
    }

    @keyframes hint-hop {
      0%, 100% { transform: var(--shape-transform) translateY(0) scale(1); }
      38% { transform: var(--shape-transform) translateY(-10px) scale(1.06); }
      62% { transform: var(--shape-transform) translateY(2px) scale(0.98); }
    }

    @keyframes jar-ready {
      0% { transform: scale(1); }
      36% { transform: scale(1.025); }
      72% { transform: scale(0.992); }
      100% { transform: scale(1); }
    }

    @keyframes free-collect {
      0% { transform: var(--shape-transform) scale(1); filter: brightness(1); }
      36% { transform: var(--shape-transform) scale(1.28) rotate(14deg); filter: brightness(1.35) saturate(1.35); }
      72% { transform: var(--shape-transform) scale(0.82) rotate(-10deg); opacity: 0.9; }
      100% { transform: var(--shape-transform) scale(0.08); opacity: 0; }
    }

    @keyframes free-wipe {
      0% { opacity: 0; clip-path: circle(0% at 50% 50%); transform: scale(0.92); }
      24% { opacity: 1; clip-path: circle(34% at 50% 50%); transform: scale(1); }
      68% { opacity: 1; clip-path: circle(120% at 50% 50%); transform: scale(1.02); }
      100% { opacity: 0; clip-path: circle(160% at 50% 50%); transform: scale(1.08); }
    }

    @media (max-width: 430px), (max-height: 860px) {
      :root {
        --cell: clamp(34px, 10.8vw, 43px);
      }

      .app {
        width: 100%;
        padding: max(8px, env(safe-area-inset-top)) 8px max(8px, env(safe-area-inset-bottom));
        gap: 6px;
      }

      .topbar,
      .jar-panel,
      .controls {
        border-width: 2px;

      }

      .topbar {

      }

      .label {
        font-size: 9px;
      }

      .value {
        margin-top: 2px;
        font-size: clamp(14px, 4.4vw, 19px);
      }

      .missions-panel {
        gap: 5px;

        min-height: 16px;
      }

      .mission-status,

      .mission-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));

      .mission-card {
        min-height: 50px;

      .mission-name {

      }

      .mission-progress {
        margin-top: 4px;
        height: 6px;
      }

      .mission-reward {

      }

      .board-wrap {

      }

      .controls {
        padding: 7px;
        grid-template-columns: 0.78fr auto 1fr 0.9fr;
        gap: 6px;
      }

      .reset-btn,
      .claim-btn,
      .choose-bet-btn {
        min-height: 38px;
        border-radius: 14px;
        padding: 0 8px;

        min-width: 78px;
      }

      .bet-value {
        font-size: 16px;
      }

      .bet-screen {
        gap: 12px;
        padding: 18px 14px;
      }

        font-size: 34px;
      }

      .menu-balance {
        min-height: 56px;
      }

      .bet-picker-value {
        min-height: 64px;
      }
    }

    @media (max-height: 760px) {
      :root {
        --cell: clamp(31px, 9.6vw, 39px);
      }

      .app {
        gap: 4px;
      }

      .topbar {
        min-height: 44px;
        padding: 5px 7px;
      }

      .mission-card {
        min-height: 44px;
      }

        display: none;
      }

        gap: 3px;
        padding: 7px;
      }

      .reset-btn,
      .claim-btn,
      .choose-bet-btn {
        min-height: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="free-transition" id="freeTransition">FREE MODE</div>
  <main class="app" id="app">
    <section class="bet-screen" id="betScreen" aria-label="bet selection">
      <div>
        <div class="bet-screen-title">Sugar Pop</div>
        <div class="bet-screen-sub" id="betScreenSub">選擇 Bet 後開始本局</div>
      </div>
      <div class="bet-picker" aria-label="round bet selector">
        <button class="round-btn" id="menuBetDown" aria-label="decrease bet">-</button>
        <div class="bet-picker-value" id="menuBet">$10</div>
        <button class="round-btn" id="menuBetUp" aria-label="increase bet">+</button>
      </div>
      <button class="start-btn" id="startGame">開始遊戲</button>
    </section>

    <section class="topbar" aria-label="game status">
      <div class="stat">
        <div class="label">Balance</div>
        <div class="value" id="balance">$1350</div>
      </div>
      <div class="stat">
        <div class="label">Base</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="label">Combo</div>
        <div class="value" id="multiplier">x1.00</div>
      </div>
      <div class="stat">
        <div class="label">Total</div>
        <div class="value" id="total">0</div>
      </div>
    </section>

    <section class="jar-panel" id="jarPanel" aria-label="sugar jar mission">
      <div class="jar-icon" id="jarIcon"><div class="jar-fill" id="jarFill"></div></div>
      <div class="jar-main">
        <div class="jar-line">
          <div class="jar-title">糖罐任務 Lv.<span id="jarLevel">1</span></div>
          <div class="jar-progress-text" id="jarText">0 / 70</div>
        </div>
        <div class="jar-track"><div class="jar-bar" id="jarBar"></div></div>
      </div>
      <div class="jar-reward" id="jarReward">滿罐 +$15.0</div>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="candy board"></div>
    </section>

    <section class="controls">
      <button class="reset-btn" id="hint">提示</button>
      <div class="betbox" aria-label="bet controls">
        <button class="round-btn" id="betDown" aria-label="decrease bet">-</button>

          <div class="label">Bet</div>
          <div class="bet-value" id="bet">$10</div>

        <button class="round-btn" id="betUp" aria-label="increase bet">+</button>

      <button class="choose-bet-btn" id="chooseBet">選擇 Bet</button>
    </section>

    <div class="toast" id="toast">點一顆糖果，再點旁邊一顆交換。</div>
    </div>
  </main>

  <script>
    const size = 7;
    const candyTypes = 6;

    const state = {
      balance: 1350,
      bet: 10,
      score: 0,
      totalScore: 0,
      comboMultiplier: 1,
      inRound: false,
      jar: {
        level: 1,
        progress: 0,
        justCompleted: false
      },
      betStates: new Map(),
      board: [],
      selected: null,
      dragStart: null,
      suppressClick: false,
      hint: [],
      clearing: new Set(),
      effects: new Map(),
      entering: new Set(),
      settling: new Set(),
      swapping: new Set(),
      popups: [],
      audio: null,
      musicTimer: null,
      idleTimer: null,
      busy: false
    };

    const els = {
      board: document.querySelector("#board"),
      balance: document.querySelector("#balance"),
      score: document.querySelector("#score"),
      multiplier: document.querySelector("#multiplier"),
      total: document.querySelector("#total"),
      bet: document.querySelector("#bet"),
      toast: document.querySelector("#toast"),
      claim: document.querySelector("#claim"),
      chooseBet: document.querySelector("#chooseBet"),
      betDown: document.querySelector("#betDown"),
      betUp: document.querySelector("#betUp"),
      hint: document.querySelector("#hint"),
      app: document.querySelector("#app"),
      betScreen: document.querySelector("#betScreen"),
      betScreenSub: document.querySelector("#betScreenSub"),
      menuBet: document.querySelector("#menuBet"),
      menuBetDown: document.querySelector("#menuBetDown"),
      menuBetUp: document.querySelector("#menuBetUp"),
      startGame: document.querySelector("#startGame"),
      freeTransition: document.querySelector("#freeTransition"),
      jarPanel: document.querySelector("#jarPanel"),
      jarFill: document.querySelector("#jarFill"),
      jarBar: document.querySelector("#jarBar"),
      jarLevel: document.querySelector("#jarLevel"),
      jarText: document.querySelector("#jarText"),
      jarReward: document.querySelector("#jarReward"),
    };

    const menuBalancePanel = document.createElement("div");
    menuBalancePanel.className = "menu-balance";
    menuBalancePanel.setAttribute("aria-label", "current balance");
    menuBalancePanel.innerHTML = `<div><div class="label">\u76ee\u524d\u9918\u984d</div><div class="menu-balance-value" id="menuBalance">$1350.0</div></div>`;
    els.betScreen.insertBefore(menuBalancePanel, els.betScreen.children[1]);
    els.menuBalance = document.querySelector("#menuBalance");

    els.hint.textContent = "\u63d0\u793a";
    els.claim.textContent = "\u6536\u4e0b\u7cd6\u5e63";
    els.chooseBet.textContent = "\u9078\u64c7 Bet";
    els.startGame.textContent = "\u958b\u59cb\u904a\u6232";
    els.betScreenSub.textContent = "\u9078\u64c7 Bet \u5f8c\u958b\u59cb\u672c\u5c40";
    els.toast.textContent = "\u9ede\u4e00\u9846\u7cd6\u679c\uff0c\u518d\u9ede\u6216\u62d6\u66f3\u65c1\u908a\u4e00\u9846\u4ea4\u63db\u3002";

    els.jarPanel.classList.add("missions-panel");
    els.jarPanel.style.gridTemplateColumns = "1fr";
    els.jarPanel.innerHTML = `
      <div class="mission-header">
        <div>
          <div class="mission-title">\u652f\u7dda\u4efb\u52d9</div>
          <div class="free-status" id="freeStatus">Free \u7cd6\u679c 0/3</div>
        </div>
        <div class="mission-status" id="missionBonus">Win x1.00</div>
      </div>
      <div class="mission-grid" id="missionGrid"></div>
    `;
    els.missionGrid = document.querySelector("#missionGrid");
    els.freeStatus = document.querySelector("#freeStatus");
    els.missionBonus = document.querySelector("#missionBonus");

    state.missions = [];
    state.missionSerial = 0;
    state.winMultiplier = 1;
    state.freeMoves = 0;
    state.freeMode = false;
    state.freeCollecting = false;
    state.suppressFreeSpawn = false;
    state.mainBoardSnapshot = null;
    state.returningFromFree = false;

    function keyOf(pos) {
      return `${pos.r},${pos.c}`;
    }

    function parseKey(key) {
      const [r, c] = key.split(",").map(Number);
      return { r, c };
    }

    function randomCandy() {
      return Math.floor(Math.random() * candyTypes);
    }

    function makeCell(type = randomCandy(), special = null) {
      return { type, special };
    }

    function cloneBoard(board) {
      return board.map(row => row.map(cell => cell ? { type: cell.type, special: cell.special } : null));
    }

    function saveBetState() {
      if (!state.board.length) return;
      state.betStates.set(state.bet, {
        board: cloneBoard(state.board),
        score: state.score,
        totalScore: state.totalScore,
        comboMultiplier: state.comboMultiplier
      });
    }

    function createFreshBoard() {
      state.board = Array.from({ length: size }, () =>
        Array.from({ length: size }, () => makeCell())
      );
      removeStartingMatches();
      ensurePlayableBoard();
    }

    function loadBetState(bet) {
      const saved = state.betStates.get(bet);
      state.selected = null;
      state.dragStart = null;
      state.hint = [];
      clearEffects();

      if (saved) {
        state.board = cloneBoard(saved.board);
        state.score = saved.score;
        state.totalScore = saved.totalScore;
        state.comboMultiplier = saved.comboMultiplier;
      } else {
        state.score = 0;
        state.totalScore = 0;
        state.comboMultiplier = 1;
        createFreshBoard();
      }

      updateUI();
      render();
      resetIdleHint();
    }

    function startRound() {
      if (state.busy) return;
      createFreshBoard();
      state.inRound = true;
      state.score = 0;
      state.totalScore = 0;
      state.comboMultiplier = 1;
      state.selected = null;
      state.dragStart = null;
      state.hint = [];
      clearEffects();
      state.betStates.set(state.bet, {
        board: cloneBoard(state.board),
        score: state.score,
        totalScore: state.totalScore,
        comboMultiplier: state.comboMultiplier
      });
      updateUI();
      render();
      resetIdleHint();
      setToast("純三消版本已準備好。4 顆會做條紋糖，5 顆會做特殊糖。");
    }

    function clearEffects() {
      state.clearing.clear();
      state.effects.clear();
      state.entering.clear();
      state.settling.clear();
      state.swapping.clear();
      state.popups = [];
    }

    function render() {
      els.board.innerHTML = "";
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          const cell = state.board[r][c];
          const posKey = `${r},${c}`;
          const button = document.createElement("button");
          button.className = "cell";
          button.type = "button";
          button.dataset.r = r;
          button.dataset.c = c;

          if (state.selected && state.selected.r === r && state.selected.c === c) button.classList.add("selected");
          if (state.hint.some(pos => pos.r === r && pos.c === c)) button.classList.add("hint");
          if (state.clearing.has(posKey)) button.classList.add("clearing");
          const effect = state.effects.get(posKey);
          if (effect) button.classList.add(effect);
          if (state.entering.has(posKey)) button.classList.add("entering");
          if (state.settling.has(posKey)) button.classList.add("settling");
          if (state.swapping.has(posKey)) button.classList.add("swapping");

          if (cell) {
            const candy = document.createElement("div");
            candy.className = `candy ${cell.special === "color" ? "special-color" : `type-${cell.type}`}`;
            if (cell.special && cell.special !== "color") candy.classList.add(`special-${cell.special}`);
            button.appendChild(candy);
          }

          els.board.appendChild(button);
        }
      }

      for (const popup of state.popups) {
        const badge = document.createElement("div");
        badge.className = `score-pop ${popup.kind === "combo" ? "combo" : ""}`;
        badge.textContent = popup.text;
        badge.style.left = `${((popup.c + 0.5) / size) * 100}%`;
        badge.style.top = `${((popup.r + 0.5) / size) * 100}%`;
        els.board.appendChild(badge);
      }
    }

    els.board.addEventListener("click", event => {
      if (state.suppressClick) {
        state.suppressClick = false;
        return;
      }
      const cell = event.target.closest(".cell");
      if (!cell || !els.board.contains(cell)) return;
      selectCell(Number(cell.dataset.r), Number(cell.dataset.c));
    });

    els.board.addEventListener("pointerdown", event => {
      const cell = event.target.closest(".cell");
      if (!cell || !els.board.contains(cell) || state.busy) return;
      clearIdleHint();
      startAudio();
      playSound("select");
      cell.setPointerCapture?.(event.pointerId);
      state.dragStart = {
        r: Number(cell.dataset.r),
        c: Number(cell.dataset.c),
        x: event.clientX,
        y: event.clientY,
        didDrag: false
      };
    });

    els.board.addEventListener("pointermove", event => {
      if (!state.dragStart || state.busy) return;
      const start = state.dragStart;
      const dx = event.clientX - start.x;
      const dy = event.clientY - start.y;
      const threshold = 20;
      if (Math.abs(dx) <= threshold && Math.abs(dy) <= threshold) return;

      const target = Math.abs(dx) > Math.abs(dy)
        ? { r: start.r, c: start.c + Math.sign(dx) }
        : { r: start.r + Math.sign(dy), c: start.c };

      state.dragStart = null;
      state.suppressClick = true;
      setTimeout(() => {
        state.suppressClick = false;
      }, 240);

      if (!inBounds(target.r, target.c) || !isAdjacent(start, target)) return;
      selectDraggedPair(start, target);
    });

    els.board.addEventListener("pointerup", event => {
      if (!state.dragStart || state.busy) {
        state.dragStart = null;
        return;
      }

      const start = state.dragStart;
      const dx = event.clientX - start.x;
      const dy = event.clientY - start.y;
      const threshold = 18;
      let target = null;

      if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
        start.didDrag = true;
        state.suppressClick = true;
        setTimeout(() => {
          state.suppressClick = false;
        }, 220);
        if (Math.abs(dx) > Math.abs(dy)) target = { r: start.r, c: start.c + Math.sign(dx) };
        else target = { r: start.r + Math.sign(dy), c: start.c };
      } else {
        const cell = event.target.closest(".cell");
        if (cell && els.board.contains(cell)) target = { r: Number(cell.dataset.r), c: Number(cell.dataset.c) };
      }

      state.dragStart = null;
      if (!target || !inBounds(target.r, target.c) || (target.r === start.r && target.c === start.c)) return;
      if (!isAdjacent(start, target)) return;
      selectDraggedPair(start, target);
    });

    els.board.addEventListener("pointercancel", () => {
      state.dragStart = null;
    });

    async function selectDraggedPair(a, b) {
      if (state.busy) return;
      state.selected = null;
      state.hint = [];
      if (!canSwapClear(a, b)) {
        render();
        playSound("invalid");
        setToast("這個方向不會消除，試試另一邊。");
        return;
      }
      await trySwap(a, b);
    }

    async function selectCell(r, c) {
      if (state.busy) return;
      clearIdleHint();
      state.hint = [];

      if (!state.selected) {
        state.selected = { r, c };
        render();
        setToast("已選取糖果，再點旁邊一顆交換。");
        return;
      }

      const first = state.selected;
      const second = { r, c };

      if (first.r === r && first.c === c) {
        state.selected = null;
        render();
        return;
      }

      if (!isAdjacent(first, second)) {
        state.selected = second;
        render();
        setToast("請點相鄰的糖果，或按提示找一組。");
        return;
      }

      if (!canSwapClear(first, second)) {
        state.selected = second;
        render();
        playSound("invalid");
        setToast("這步不會消除，請改選另一顆。");
        return;
      }

      await trySwap(first, second);
    }

    function canSwapClear(a, b) {
      swap(a, b);
      const works = findMatchGroups().length > 0 || Boolean(specialSwapGroup(a, b)) || Boolean(colorSwapGroup(a, b));
      swap(a, b);
      return works;
    }

    function specialSwapGroup(a, b) {
      const cellA = state.board[a.r][a.c];
      const cellB = state.board[b.r][b.c];
      if (!cellA || !cellB || !cellA.special || !cellB.special) return null;

      const specials = [cellA.special, cellB.special];
      const has = special => specials.includes(special);
      const isStriped = special => special === "striped-h" || special === "striped-v";

      if (has("color")) return colorSpecialComboGroup(a, b, cellA, cellB);

      if (isStriped(cellA.special) && isStriped(cellB.special)) {
        return {
          cells: [a, b],
          centers: [a, b],
          orientation: "special",
          type: cellA.type,
          comboSpecial: "striped-striped",
          forceMessage: "條紋糖連動：十字消除！"
        };
      }

      if ((isStriped(cellA.special) && cellB.special === "wrapped") ||
        (isStriped(cellB.special) && cellA.special === "wrapped")) {
        return {
          cells: [a, b],
          centers: [a, b],
          orientation: "special",
          type: cellA.type,
          comboSpecial: "striped-wrapped",
          forceMessage: "條紋糖 + 包裝糖：三行三列消除！"
        };
      }

      if (cellA.special === "wrapped" && cellB.special === "wrapped") {
        return {
          cells: [a, b],
          centers: [a, b],
          orientation: "special",
          type: cellA.type,
          comboSpecial: "wrapped-wrapped",
          forceMessage: "包裝糖連動：大範圍爆炸！"
        };
      }

      return null;
    }

    function colorSpecialComboGroup(a, b, cellA, cellB) {
      const colorPos = cellA.special === "color" ? a : b;
      const target = cellA.special === "color" ? cellB : cellA;

      if (target.special === "color") {
        const cells = [];
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) cells.push({ r, c });
        }
        return {
          cells,
          orientation: "special",
          type: target.type,
          comboSpecial: "color-color",
          forceMessage: "彩虹糖連動：全盤清除！"
        };
      }

      if (target.special === "striped-h" || target.special === "striped-v" || target.special === "wrapped") {
        const cells = [colorPos];
        const targets = [];
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) {
            if (state.board[r][c] && state.board[r][c].type === target.type) {
              const pos = { r, c };
              cells.push(pos);
              targets.push(pos);
            }
          }
        }

        return {
          cells,
          targets,
          orientation: "special",
          type: target.type,
          comboSpecial: target.special === "wrapped" ? "color-wrapped" : "color-striped",
          forceMessage: target.special === "wrapped"
            ? "彩虹糖連動：同色糖全部爆開！"
            : "彩虹糖連動：同色糖變成條紋糖後觸發！"
        };
      }

      return null;
    }

    async function trySwap(a, b) {
      if (!state.inRound) {
        playSound("invalid");
        setToast("\u8acb\u5148\u9078\u64c7 Bet \u958b\u59cb\u65b0\u5c40\u3002");
        return;
      }
      if (!spendBet()) return;
      state.busy = true;
      state.comboMultiplier = 1;
      updateUI();
      state.selected = null;
      state.swapping = new Set([keyOf(a), keyOf(b)]);
      swap(a, b);
      render();
      await wait(220);
      state.swapping.clear();

      const specialSwap = specialSwapGroup(a, b);
      if (specialSwap) {
        await resolveMatches([specialSwap], []);
        return;
      }

      const groups = findMatchGroups();
      if (!groups.length) {
        const colorSwap = colorSwapGroup(a, b);
        if (colorSwap) {
          await resolveMatches([colorSwap], []);
          return;
        }

        state.swapping = new Set([keyOf(a), keyOf(b)]);
        swap(a, b);
        render();
        await wait(180);
        state.swapping.clear();
        state.busy = false;
        render();
        setToast("這組沒有消除，糖果彈回原位。");
        return;
      }

      await resolveMatches(groups, [a, b]);
    }

    function colorSwapGroup(a, b) {
      const cellA = state.board[a.r][a.c];
      const cellB = state.board[b.r][b.c];
      const colorPos = cellA && cellA.special === "color" ? a : cellB && cellB.special === "color" ? b : null;
      const target = colorPos === a ? cellB : colorPos === b ? cellA : null;
      if (!colorPos || !target) return null;

      const cells = [colorPos];
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (state.board[r][c] && state.board[r][c].type === target.type) cells.push({ r, c });
        }
      }

      return { cells, orientation: "special", type: target.type, forceMessage: "彩虹糖清除同色糖！" };
    }

    function isAdjacent(a, b) {
      return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
    }

    function colorSwapGroup(a, b) {
      const cellA = state.board[a.r][a.c];
      const cellB = state.board[b.r][b.c];
      const colorPos = cellA && cellA.special === "color" ? a : cellB && cellB.special === "color" ? b : null;
      const target = colorPos === a ? cellB : colorPos === b ? cellA : null;
      if (!colorPos || !target) return null;

      if (target.special === "color") {
        const cells = [];
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) cells.push({ r, c });
        }
        return {
          cells,
          orientation: "special",
          type: target.type,
          comboSpecial: "color-color",
          forceMessage: "彩虹糖連動：全盤清除！"
        };
      }

      const cells = [colorPos];
      const targets = [];
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (state.board[r][c] && state.board[r][c].type === target.type) {
            const pos = { r, c };
            cells.push(pos);
            targets.push(pos);
          }
        }
      }

      const comboSpecial = target.special === "striped-h" || target.special === "striped-v"
        ? "color-striped"
        : target.special === "wrapped"
          ? "color-wrapped"
          : "color-normal";

      const messages = {
        "color-normal": "彩虹糖清除同色糖！",
        "color-striped": "彩虹糖連動：同色糖變成光束！",
        "color-wrapped": "彩虹糖連動：同色糖全部爆開！"
      };

      return {
        cells,
        targets,
        orientation: "special",
        type: target.type,
        comboSpecial,
        forceMessage: messages[comboSpecial]
      };
    }

    function swap(a, b) {
      const temp = state.board[a.r][a.c];
      state.board[a.r][a.c] = state.board[b.r][b.c];
      state.board[b.r][b.c] = temp;
    }

    async function resolveMatches(initialGroups, swapPair = []) {
      try {
        let groups = initialGroups;
        let chain = 0;
        const maxChains = 30;

        while (groups.length && chain < maxChains) {
          chain += 1;
          const specialPlans = chooseCreatedSpecials(groups, swapPair);
          const clearSet = expandClearSet(flattenGroups(groups), specialPlans, groups);
          for (const [key, pos] of Array.from(clearSet.entries())) {
            const cell = state.board[pos.r][pos.c];
            if (cell && cell.special === "free") clearSet.delete(key);
          }
          const clearList = Array.from(clearSet, parseKey);
          const visuals = collectSpecialVisuals(clearSet, specialPlans, groups);
          const chargeVisuals = collectColorChargeVisuals(groups);

          const baseGain = clearList.length * perCandyPayout();
          const comboGain = chain > 1 ? 0.1 * (chain - 1) : 0;
          state.score += baseGain;
          state.comboMultiplier += comboGain;
          state.totalScore += baseGain * state.comboMultiplier;
          const jarResult = addJarProgress(clearList, groups, chain);
          updateUI();
          showScorePopups(clearList, baseGain, comboGain, jarResult);

          if (chargeVisuals.size) {
            state.effects = chargeVisuals;
            render();
            setToast("彩虹糖正在充能特殊糖果...");
            playSound("special");
            await wait(540);
            state.effects.clear();
          }

          if (visuals.size) {
            state.effects = visuals;
            render();
            setToast(describeSpecialVisuals(visuals));
            playSound("special");
            await wait(340);
            state.effects.clear();
          }

          state.clearing = clearSet;
          render();
          setToast(chain === 1 ? describeSpecialPlan(specialPlans, groups) : `Combo ${chain - 1}！`);
          playSound(chain === 1 ? "clear" : "combo");
          await wait(280);
          state.popups = [];

          for (const pos of clearList) state.board[pos.r][pos.c] = null;
          for (const specialPlan of specialPlans) {
            state.board[specialPlan.pos.r][specialPlan.pos.c] = makeCell(specialPlan.type, specialPlan.special);
          }
          state.clearing.clear();

          const moved = collapseBoard();
          const filled = refillBoard();
          state.settling = new Set(moved.map(keyOf));
          state.entering = new Set(filled.map(keyOf));
          updateUI();
          render();
          setToast("糖果下落，補牌完成。");
          await wait(330);

          state.settling.clear();
          state.entering.clear();
          render();
          await wait(80);
          groups = findMatchGroups();
          swapPair = [];
        }

        if (chain >= maxChains && findMatchGroups().length) setToast("Combo 已結算，下一步仍可繼續消除。");
      } catch (error) {
        console.error(error);
        setToast("流程已重置，可以繼續玩。");
      } finally {
        state.busy = false;
        state.selected = null;
        state.hint = [];
        clearEffects();
        ensurePlayableBoard();
        saveBetState();
        updateUI();
        render();
        resetIdleHint();
      }
    }

    function flattenGroups(groups) {
      const map = new Map();
      for (const group of groups) {
        for (const pos of group.cells) map.set(keyOf(pos), pos);
      }
      return Array.from(map.values());
    }

    function showScorePopups(clearList, baseGain, comboGain, jarResult = null) {
      if (!clearList.length) return;
      const center = clearList.reduce((sum, pos) => ({
        r: sum.r + pos.r,
        c: sum.c + pos.c
      }), { r: 0, c: 0 });
      const r = center.r / clearList.length;
      const c = center.c / clearList.length;

      state.popups = [
        { r, c, text: `+${formatScore(baseGain)}`, kind: "score" }
      ];
      if (comboGain > 0) {
        state.popups.push({
          r: Math.max(0, r - 0.55),
          c: Math.min(size - 1, c + 0.55),
          text: `Combo +x${comboGain.toFixed(2)}`,
          kind: "combo"
        });
      }
      if (jarResult && jarResult.points > 0) {
        state.popups.push({
          r: Math.min(size - 1, r + 0.65),
          c: Math.max(0, c - 0.45),
          text: jarResult.completed ? `\u7cd6\u7f50 +${money(jarResult.reward)}` : `\u7cd6\u7f50 +${jarResult.points}`,
          kind: "combo"
        });
      }
    }

    function jarTarget() {
      return 70 + (state.jar.level - 1) * 10;
    }

    function jarReward() {
      return Number((state.bet * (1.5 + Math.min(state.jar.level - 1, 8) * 0.15)).toFixed(1));
    }

    function addJarProgress(clearList, groups, chain) {
      const specialBonus = groups.reduce((sum, group) => {
        if (group.comboSpecial) return sum + 10;
        if (group.special || group.forceMessage) return sum + 6;
        return sum;
      }, 0);
      const comboBonus = chain > 1 ? chain * 3 : 0;
      let points = clearList.length + specialBonus + comboBonus;
      let completed = false;
      let reward = 0;

      while (points > 0) {
        const target = jarTarget();
        const need = target - state.jar.progress;
        const used = Math.min(points, need);
        state.jar.progress += used;
        points -= used;

        if (state.jar.progress >= target) {
          completed = true;
          const earned = jarReward();
          reward += earned;
          state.totalScore += earned;
          state.jar.level += 1;
          state.jar.progress = 0;
        }
      }

      if (completed) {
        state.jar.justCompleted = true;
        playSound("combo");
        setTimeout(() => {
          setToast(`\u7cd6\u7f50\u6eff\u4e86\uff0c\u4efb\u52d9\u734e\u52f5 +${money(reward)}\uff01`);
        }, 40);
        setTimeout(() => {
          state.jar.justCompleted = false;
          updateUI();
        }, 850);
      }

      return {
        points: clearList.length + specialBonus + comboBonus,
        completed,
        reward
      };
    }

    function chooseCreatedSpecials(groups, swapPair) {
      const candidates = [];
      const horizontal = groups.filter(group => group.orientation === "h");
      const vertical = groups.filter(group => group.orientation === "v");

      for (const h of horizontal) {
        for (const v of vertical) {
          const cross = h.cells.find(a => v.cells.some(b => a.r === b.r && a.c === b.c));
          if (cross) {
            candidates.push({ pos: cross, type: h.type, special: "wrapped", rank: 3 });
          }
        }
      }

      for (const group of groups) {
        if (group.orientation === "special") continue;
        if (group.cells.length >= 5) {
          candidates.push({ pos: pickSpecialPosition(group, swapPair), type: group.type, special: "color", rank: 4 });
        } else if (group.cells.length === 4) {
          candidates.push({
            pos: pickSpecialPosition(group, swapPair),
            type: group.type,
            special: group.orientation === "h" ? "striped-h" : "striped-v",
            rank: 2
          });
        }
      }

      const byPosition = new Map();
      candidates.sort((a, b) => b.rank - a.rank);
      for (const candidate of candidates) {
        const key = keyOf(candidate.pos);
        if (!byPosition.has(key)) byPosition.set(key, candidate);
      }
      return Array.from(byPosition.values());
    }

    function pickSpecialPosition(group, swapPair) {
      for (const swapped of swapPair) {
        const hit = group.cells.find(pos => pos.r === swapped.r && pos.c === swapped.c);
        if (hit) return hit;
      }
      return group.cells[Math.floor(group.cells.length / 2)];
    }

    function describeSpecialPlan(plans = [], groups = []) {
      const forced = groups.find(group => group.forceMessage);
      if (forced) return forced.forceMessage;
      const plan = plans[0];
      if (plans.length > 1) return `做出 ${plans.length} 顆特殊糖！`;
      if (!plan) return "糖果消除中...";
      if (plan.special === "striped-h" || plan.special === "striped-v") return "4 顆連線，做出條紋糖！";
      if (plan.special === "wrapped") return "T/L 形消除，做出包裝糖！";
      if (plan.special === "color") return "5 顆直線，做出彩虹糖！";
      return "糖果消除中...";
    }

    function expandClearSet(baseMatches, specialPlans = [], groups = []) {
      const clear = new Map();
      for (const pos of baseMatches) {
        const cell = state.board[pos.r][pos.c];
        if (cell && cell.special === "color" && !isColorComboPosition(pos, groups)) continue;
        clear.set(keyOf(pos), pos);
      }
      for (const specialPlan of specialPlans) clear.delete(keyOf(specialPlan.pos));
      applyColorComboClear(clear, groups);
      applySpecialComboClear(clear, groups);

      let changed = true;
      while (changed) {
        changed = false;
        for (const pos of Array.from(clear.values())) {
          const cell = state.board[pos.r][pos.c];
          if (!cell || !cell.special) continue;
          if (cell.special === "color") continue;
          const before = clear.size;
          addSpecialEffect(clear, pos, cell);
          if (clear.size > before) changed = true;
        }
      }

      return new Set(clear.keys());
    }

    function isColorComboPosition(pos, groups) {
      return groups.some(group =>
        group.comboSpecial && group.cells.some(cellPos => cellPos.r === pos.r && cellPos.c === pos.c)
      );
    }

    function applyColorComboClear(clear, groups) {
      const combo = groups.find(group => group.comboSpecial);
      if (!combo) return;

      if (combo.comboSpecial === "color-color") {
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) clear.set(`${r},${c}`, { r, c });
        }
      } else if (combo.comboSpecial === "color-striped") {
        combo.targets.forEach((pos, index) => {
          if (index % 2 === 0) {
            for (let c = 0; c < size; c += 1) clear.set(`${pos.r},${c}`, { r: pos.r, c });
          } else {
            for (let r = 0; r < size; r += 1) clear.set(`${r},${pos.c}`, { r, c: pos.c });
          }
        });
      } else if (combo.comboSpecial === "color-wrapped") {
        for (const pos of combo.targets) {
          for (let dr = -1; dr <= 1; dr += 1) {
            for (let dc = -1; dc <= 1; dc += 1) {
              const r = pos.r + dr;
              const c = pos.c + dc;
              if (inBounds(r, c)) clear.set(`${r},${c}`, { r, c });
            }
          }
        }
      }
    }

    function applySpecialComboClear(clear, groups) {
      const combo = groups.find(group => group.comboSpecial);
      if (!combo) return;

      if (combo.comboSpecial === "striped-striped") {
        const center = combo.centers[0];
        for (let c = 0; c < size; c += 1) clear.set(`${center.r},${c}`, { r: center.r, c });
        for (let r = 0; r < size; r += 1) clear.set(`${r},${center.c}`, { r, c: center.c });
      } else if (combo.comboSpecial === "striped-wrapped") {
        const center = combo.centers[0];
        for (let dr = -1; dr <= 1; dr += 1) {
          const row = center.r + dr;
          if (row >= 0 && row < size) {
            for (let c = 0; c < size; c += 1) clear.set(`${row},${c}`, { r: row, c });
          }
        }
        for (let dc = -1; dc <= 1; dc += 1) {
          const col = center.c + dc;
          if (col >= 0 && col < size) {
            for (let r = 0; r < size; r += 1) clear.set(`${r},${col}`, { r, c: col });
          }
        }
      } else if (combo.comboSpecial === "wrapped-wrapped") {
        for (const center of combo.centers) {
          for (let dr = -2; dr <= 2; dr += 1) {
            for (let dc = -2; dc <= 2; dc += 1) {
              const r = center.r + dr;
              const c = center.c + dc;
              if (inBounds(r, c)) clear.set(`${r},${c}`, { r, c });
            }
          }
        }
      }
    }

    function collectSpecialVisuals(clearSet, specialPlans = [], groups = []) {
      const visuals = new Map();
      applyColorComboVisuals(visuals, clearSet, groups);
      applySpecialComboVisuals(visuals, clearSet, groups);

      for (const key of clearSet) {
        const pos = parseKey(key);
        const cell = state.board[pos.r][pos.c];
        if (!cell || !cell.special) continue;

        if (cell.special === "striped-h") {
          for (let c = 0; c < size; c += 1) visuals.set(`${pos.r},${c}`, "blast-h");
        } else if (cell.special === "striped-v") {
          for (let r = 0; r < size; r += 1) visuals.set(`${r},${pos.c}`, "blast-v");
        } else if (cell.special === "wrapped") {
          for (let dr = -1; dr <= 1; dr += 1) {
            for (let dc = -1; dc <= 1; dc += 1) {
              const r = pos.r + dr;
              const c = pos.c + dc;
              if (inBounds(r, c)) visuals.set(`${r},${c}`, "blast-burst");
            }
          }
        } else if (cell.special === "color") {
          for (const clearKey of clearSet) visuals.set(clearKey, "blast-color");
        }
      }

      return visuals;
    }

    function collectColorChargeVisuals(groups = []) {
      const combo = groups.find(group => group.comboSpecial && group.comboSpecial.startsWith("color-"));
      const visuals = new Map();
      if (!combo || combo.comboSpecial === "color-normal") return visuals;

      if (combo.comboSpecial === "color-color") {
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) visuals.set(`${r},${c}`, "color-charge");
        }
      } else {
        for (const pos of combo.targets || []) visuals.set(keyOf(pos), "color-charge");
      }
      return visuals;
    }

    function applyColorComboVisuals(visuals, clearSet, groups) {
      const combo = groups.find(group => group.comboSpecial);
      if (!combo) return;

      if (combo.comboSpecial === "color-color") {
        for (const key of clearSet) visuals.set(key, "blast-color");
      } else if (combo.comboSpecial === "color-striped") {
        combo.targets.forEach((pos, index) => {
          if (index % 2 === 0) {
            for (let c = 0; c < size; c += 1) visuals.set(`${pos.r},${c}`, "blast-h");
          } else {
            for (let r = 0; r < size; r += 1) visuals.set(`${r},${pos.c}`, "blast-v");
          }
        });
      } else if (combo.comboSpecial === "color-wrapped") {
        for (const pos of combo.targets) {
          for (let dr = -1; dr <= 1; dr += 1) {
            for (let dc = -1; dc <= 1; dc += 1) {
              const r = pos.r + dr;
              const c = pos.c + dc;
              if (inBounds(r, c)) visuals.set(`${r},${c}`, "blast-burst");
            }
          }
        }
      }
    }

    function applySpecialComboVisuals(visuals, clearSet, groups) {
      const combo = groups.find(group => group.comboSpecial);
      if (!combo) return;

      if (combo.comboSpecial === "striped-striped") {
        const center = combo.centers[0];
        for (let c = 0; c < size; c += 1) visuals.set(`${center.r},${c}`, "blast-h");
        for (let r = 0; r < size; r += 1) visuals.set(`${r},${center.c}`, "blast-v");
      } else if (combo.comboSpecial === "striped-wrapped") {
        const center = combo.centers[0];
        for (let dr = -1; dr <= 1; dr += 1) {
          const row = center.r + dr;
          if (row >= 0 && row < size) {
            for (let c = 0; c < size; c += 1) visuals.set(`${row},${c}`, "blast-h");
          }
        }
        for (let dc = -1; dc <= 1; dc += 1) {
          const col = center.c + dc;
          if (col >= 0 && col < size) {
            for (let r = 0; r < size; r += 1) visuals.set(`${r},${col}`, "blast-v");
          }
        }
      } else if (combo.comboSpecial === "wrapped-wrapped") {
        for (const center of combo.centers) {
          for (let dr = -2; dr <= 2; dr += 1) {
            for (let dc = -2; dc <= 2; dc += 1) {
              const r = center.r + dr;
              const c = center.c + dc;
              if (inBounds(r, c)) visuals.set(`${r},${c}`, "blast-burst");
            }
          }
        }
      }
    }

    function describeSpecialVisuals(visuals) {
      const classes = new Set(visuals.values());
      if (classes.has("blast-color")) return "彩虹糖掃描同色糖！";
      if (classes.has("blast-burst")) return "包裝糖爆開！";
      if (classes.has("blast-h") || classes.has("blast-v")) return "條紋糖發射光束！";
      return "特殊糖果發動！";
    }

    function addSpecialEffect(clear, pos, cell) {
      if (cell.special === "striped-h") {
        for (let c = 0; c < size; c += 1) clear.set(`${pos.r},${c}`, { r: pos.r, c });
      } else if (cell.special === "striped-v") {
        for (let r = 0; r < size; r += 1) clear.set(`${r},${pos.c}`, { r, c: pos.c });
      } else if (cell.special === "wrapped") {
        for (let dr = -1; dr <= 1; dr += 1) {
          for (let dc = -1; dc <= 1; dc += 1) {
            const r = pos.r + dr;
            const c = pos.c + dc;
            if (inBounds(r, c)) clear.set(`${r},${c}`, { r, c });
          }
        }
      } else if (cell.special === "color") {
        const targetType = firstNormalMatchedType(clear, cell.type);
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) {
            if (state.board[r][c] && state.board[r][c].type === targetType) clear.set(`${r},${c}`, { r, c });
          }
        }
      }
    }

    function firstNormalMatchedType(clear, fallback) {
      for (const pos of clear.values()) {
        const cell = state.board[pos.r][pos.c];
        if (cell && !cell.special) return cell.type;
      }
      return fallback;
    }

    function collapseBoard() {
      const moved = [];
      for (let c = 0; c < size; c += 1) {
        const column = [];
        for (let r = size - 1; r >= 0; r -= 1) {
          if (state.board[r][c]) column.push({ cell: state.board[r][c], from: r });
        }
        for (let r = size - 1; r >= 0; r -= 1) {
          const item = column[size - 1 - r] || null;
          state.board[r][c] = item ? item.cell : null;
          if (item && item.from !== r) moved.push({ r, c });
        }
      }
      return moved;
    }

    function refillBoard() {
      const filled = [];
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (!state.board[r][c]) {
            state.board[r][c] = makeCell(safeCandyType(r, c));
            filled.push({ r, c });
          }
        }
      }
      return filled;
    }

    function safeCandyType(r, c) {
      const blocked = new Set();
      if (c >= 2 && state.board[r][c - 1] && state.board[r][c - 2] &&
        state.board[r][c - 1].type === state.board[r][c - 2].type) blocked.add(state.board[r][c - 1].type);
      if (r >= 2 && state.board[r - 1][c] && state.board[r - 2][c] &&
        state.board[r - 1][c].type === state.board[r - 2][c].type) blocked.add(state.board[r - 1][c].type);
      if (r <= size - 3 && state.board[r + 1][c] && state.board[r + 2][c] &&
        state.board[r + 1][c].type === state.board[r + 2][c].type) blocked.add(state.board[r + 1][c].type);

      const options = [];
      for (let type = 0; type < candyTypes; type += 1) {
        if (!blocked.has(type)) options.push(type);
      }
      return options[Math.floor(Math.random() * options.length)];
    }

    function findMatches() {
      return flattenGroups(findMatchGroups());
    }

    function findMatchGroups() {
      const groups = [];
      for (let r = 0; r < size; r += 1) {
        let run = [{ r, c: 0 }];
        for (let c = 1; c < size; c += 1) {
          if (sameMatchType(state.board[r][c], state.board[r][c - 1])) run.push({ r, c });
          else {
            addGroup(groups, run, "h");
            run = [{ r, c }];
          }
        }
        addGroup(groups, run, "h");
      }

      for (let c = 0; c < size; c += 1) {
        let run = [{ r: 0, c }];
        for (let r = 1; r < size; r += 1) {
          if (sameMatchType(state.board[r][c], state.board[r - 1][c])) run.push({ r, c });
          else {
            addGroup(groups, run, "v");
            run = [{ r, c }];
          }
        }
        addGroup(groups, run, "v");
      }
      return groups;
    }

    function sameMatchType(a, b) {
      return a && b && a.special !== "color" && b.special !== "color" && a.type === b.type;
    }

    function addGroup(groups, run, orientation) {
      if (run.length < 3) return;
      const first = state.board[run[0].r][run[0].c];
      groups.push({ cells: run.slice(), orientation, type: first.type });
    }

    function removeStartingMatches() {
      let matches = findMatches();
      let guard = 0;
      while (matches.length && guard < 80) {
        for (const pos of matches) {
          state.board[pos.r][pos.c] = makeCell(safeCandyType(pos.r, pos.c));
        }
        matches = findMatches();
        guard += 1;
      }
    }

    function findValidMove() {
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          const a = { r, c };
          const candidates = [{ r: r + 1, c }, { r, c: c + 1 }];
          for (const b of candidates) {
            if (!inBounds(b.r, b.c)) continue;
            swap(a, b);
            const works = findMatchGroups().length > 0;
            swap(a, b);
            if (works) return [a, b];
          }
        }
      }
      return null;
    }

    function ensurePlayableBoard() {
      let guard = 0;
      while (!findValidMove() && guard < 100) {
        createGuaranteedMove();
        removeStartingMatches();
        guard += 1;
      }
    }

    function createGuaranteedMove() {
      const row = Math.floor(Math.random() * size);
      const col = Math.floor(Math.random() * (size - 3));
      const type = randomCandy();
      const decoy = (type + 1 + Math.floor(Math.random() * (candyTypes - 1))) % candyTypes;

      state.board[row][col] = makeCell(type);
      state.board[row][col + 1] = makeCell(type);
      state.board[row][col + 2] = makeCell(decoy);
      state.board[row][col + 3] = makeCell(type);
    }

    function showHint() {
      if (!state.inRound) return;
      if (state.busy) return;
      clearIdleHint();
      const move = findValidMove();
      if (!move) {
        createGuaranteedMove();
        removeStartingMatches();
        state.hint = [];
        render();
        setToast("已產生新的可消除機會。");
        return;
      }
      state.selected = null;
      state.hint = move;
      render();
      setToast("黃色框框這兩顆可以交換。");
      resetIdleHint();
    }

    function resetIdleHint() {
      if (!state.inRound) return;
      if (state.idleTimer) clearTimeout(state.idleTimer);
      state.idleTimer = setTimeout(() => {
        if (state.busy || state.selected) {
          resetIdleHint();
          return;
        }
        const move = findValidMove();
        if (!move) return;
        state.hint = move;
        render();
        setToast("提示：黃色框框這兩顆可以交換。");
      }, 5000);
    }

    function clearIdleHint() {
      if (state.idleTimer) clearTimeout(state.idleTimer);
      state.hint = [];
    }

    function updateUI() {
      const target = jarTarget();
      const jarPercent = Math.max(0, Math.min(100, (state.jar.progress / target) * 100));
      els.app.classList.toggle("in-round", state.inRound);
      els.balance.textContent = money(state.balance);
      els.menuBalance.textContent = money(state.balance);
      els.bet.textContent = money(state.bet);
      els.menuBet.textContent = money(state.bet);
      els.score.textContent = formatScore(state.score);
      els.multiplier.textContent = `x${state.comboMultiplier.toFixed(2)}`;
      els.total.textContent = formatScore(state.totalScore);
      els.jarLevel.parentElement.firstChild.nodeValue = "\u7cd6\u7f50\u4efb\u52d9 Lv.";
      els.jarLevel.textContent = state.jar.level;
      els.jarText.textContent = `${state.jar.progress} / ${target}`;
      els.jarReward.textContent = `\u6eff\u7f50 +${money(jarReward())}`;
      els.jarBar.style.setProperty("--jar-width", `${jarPercent}%`);
      els.jarFill.style.setProperty("--jar-fill", `${Math.max(8, jarPercent)}%`);
      els.jarPanel.classList.toggle("ready", state.jar.justCompleted);
      const canAfford = state.balance >= state.bet;
      els.claim.disabled = !state.inRound || state.freeMode || finalScore() <= 0 || state.busy;
      els.chooseBet.disabled = !state.inRound || state.busy || state.freeMode;
      els.startGame.disabled = state.inRound || state.busy || !canAfford;
      els.menuBetDown.disabled = state.inRound || state.busy || state.bet <= 5;
      els.menuBetUp.disabled = state.inRound || state.busy || state.bet >= 100 || state.bet + 5 > state.balance;
      els.betDown.disabled = true;
      els.betUp.disabled = true;
    }

    function claim() {
      if (finalScore() <= 0 || state.busy) {
        playSound("invalid");
        setToast("先完成至少一次消除，才可以收下糖幣。");
        return;
      }
      const win = finalScore();
      state.balance += win;
      state.score = 0;
      state.totalScore = 0;
      state.comboMultiplier = 1;
      saveBetState();
      updateUI();
      playSound("claim");
      setToast(`收下 ${money(win)} 糖幣，繼續目前盤面。`);
      resetIdleHint();
    }

    function spendBet() {
      if (state.balance < state.bet) {
        playSound("invalid");
        setToast("餘額不足，請降低 Bet 或收下糖幣。");
        return false;
      }
      state.balance -= state.bet;
      updateUI();
      return true;
    }

    function changeBet(delta) {
      if (state.busy) {
        playSound("invalid");
        setToast("請等糖果消除完成後再切換 Bet。");
        return;
      }
      saveBetState();
      const previousBet = state.bet;
      state.bet = Math.max(5, Math.min(100, state.bet + delta));
      if (state.bet > state.balance && state.balance >= 5) state.bet = Math.floor(state.balance / 5) * 5;
      if (state.bet === previousBet) {
        updateUI();
        return;
      }
      loadBetState(state.bet);
      setToast(`切換到 ${money(state.bet)} Bet 盤面。`);
    }

    function money(value) {
      return `$${Number(value).toFixed(1)}`;
    }

    function finalScore() {
      return Number(state.totalScore.toFixed(1));
    }

    function perCandyPayout() {
      return state.bet * 0.18;
    }

    function formatScore(value) {
      return Number(value).toFixed(1);
    }

    const candyNames = ["\u7d05\u8272", "\u7da0\u8272", "\u9ec3\u8272", "\u85cd\u8272", "\u6a58\u8272", "\u7d2b\u8272"];
    const missionSlots = ["common", "common", "medium", "jackpot"];

    function resetAllMissions() {
      state.missions = missionSlots.map(tier => createMission(tier));
    }

    function createMission(tier) {
      state.missionSerial += 1;
      const color = Math.floor(Math.random() * candyTypes);
      const common = [
        () => ({
          type: "color",
          color,
          target: 10,
          reward: { kind: "bonus", value: 0.5 },
