<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Sugar Pop Click Demo</title>
  <style>
    :root {
      --ink: #5a2d61;
      --panel: rgba(255, 255, 255, 0.78);
      --cell: clamp(32px, 10.6vw, 58px);
      --app-height: 100svh;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: var(--app-height);
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 216, 77, 0.78) 0 18px, transparent 19px),
        radial-gradient(circle at 86% 16%, rgba(63, 205, 255, 0.72) 0 24px, transparent 25px),
        radial-gradient(circle at 82% 84%, rgba(255, 70, 153, 0.66) 0 24px, transparent 25px),
        linear-gradient(160deg, #fff0a8 0%, #ffb7d8 45%, #a8ecff 100%);
      user-select: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.34) 0 9px, transparent 9px 26px),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.56), transparent 48%);
      opacity: 0.56;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100vw, 560px);
      height: var(--app-height);
      min-height: var(--app-height);
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: minmax(112px, auto) minmax(0, 1fr) 46px;
      gap: 8px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 104px;
      overflow: hidden;
    }

    .brand {
      display: grid;
      gap: 0;
      line-height: 1;
    }

    .brand-title {
      font-size: clamp(24px, 8vw, 40px);
      font-weight: 1000;
      color: #ff337f;
      text-shadow: 0 3px 0 #fff, 0 6px 14px rgba(117, 24, 87, 0.18);
      letter-spacing: 0;
    }

    .brand-sub {
      margin-top: 2px;
      font-size: 12px;
      font-weight: 900;
      color: rgba(90, 45, 97, 0.72);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(74px, 1fr));
      gap: 6px;
      align-self: start;
    }

    .stat {
      min-width: 0;
      min-height: 49px;
      padding: 7px 8px;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(150, 58, 113, 0.12), inset 0 1px 0 rgba(255,255,255,0.82);
    }

    .label {
      font-size: 11px;
      font-weight: 900;
      color: rgba(90, 45, 97, 0.68);
      text-transform: uppercase;
    }

    .value {
      margin-top: 2px;
      font-size: 19px;
      line-height: 1;
      font-weight: 1000;
      color: #7b2c91;
    }

    .board-zone {
      min-height: 0;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      overflow: visible;
    }

    .board {
      position: relative;
      width: calc(var(--cell) * 7 + 18px);
      height: calc(var(--cell) * 9 + 18px);
      min-width: calc(var(--cell) * 7 + 18px);
      min-height: calc(var(--cell) * 9 + 18px);
      max-width: calc(var(--cell) * 7 + 18px);
      max-height: calc(var(--cell) * 9 + 18px);
      padding: 9px;
      display: grid;
      grid-template-columns: repeat(7, var(--cell));
      grid-template-rows: repeat(9, var(--cell));
      border-radius: 12px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.82), rgba(255,255,255,0.34)),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.16) 0 8px, transparent 8px 20px);
      border: 2px solid rgba(255,255,255,0.86);
      box-shadow: 0 18px 34px rgba(113, 38, 99, 0.22), inset 0 2px 0 rgba(255,255,255,0.85);
      touch-action: manipulation;
      contain: layout style;
      isolation: isolate;
      transform: translateZ(0);
      will-change: contents;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border: 0;
      padding: 5px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.26);
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 160ms ease, background 160ms ease;
      contain: layout style;
    }

    .cell:active { transform: scale(0.94); }
    .cell.invalid { animation: shake 260ms ease; }
    .cell.clearing .candy { animation: candy-clear 330ms ease forwards; }
    .cell.entering .candy { animation: candy-enter 360ms cubic-bezier(.2, .95, .24, 1.05); }
    .cell.settling .candy { animation: candy-settle 280ms cubic-bezier(.2, .95, .24, 1.05); }
    .cell.hint { background: rgba(255,255,255,0.48); }
    .cell.hint .candy { animation: hint-hop 760ms ease-in-out infinite; }
    .board.reshuffling .candy { animation: candy-vacuum 620ms cubic-bezier(.62, .02, .86, .38) forwards; }
    .board.spawning .candy { animation: candy-spit 560ms cubic-bezier(.16, .92, .24, 1.12) both; }

    .candy {
      position: relative;
      width: 96%;
      height: 96%;
      border-radius: 0;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      filter: drop-shadow(0 7px 8px rgba(89, 31, 93, 0.22));
      transform-origin: center;
      overflow: visible;
    }

    .candy::before,
    .candy::after { display: none; }

    .type-0 {
      background-image: url("assets/candies/candy-0.png");
    }

    .type-1 {
      background-image: url("assets/candies/candy-1.png");
    }

    .type-2 {
      background-image: url("assets/candies/candy-2.png");
    }

    .type-3 {
      background-image: url("assets/candies/candy-3.png");
    }

    .type-4 {
      background-image: url("assets/candies/candy-4.png");
    }

    .type-5 {
      background-image: url("assets/candies/candy-5.png");
    }

    .special-wild {
      background-image: url("assets/candies/candy-5.png");
      filter: drop-shadow(0 0 10px rgba(255, 244, 84, 0.95)) drop-shadow(0 7px 8px rgba(89, 31, 93, 0.22));
      animation: wild-idle 1180ms ease-in-out infinite;
    }

    .special-wild::before {
      content: "";
      display: block;
      position: absolute;
      inset: 4%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(255,64,128,0.9), rgba(255,222,60,0.86), rgba(54,216,255,0.82), rgba(139,80,255,0.86), rgba(255,64,128,0.9));
      opacity: 0.36;
      filter: blur(1px);
      animation: wild-spin 1600ms linear infinite;
      z-index: -1;
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .bet-controls {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .bet-btn {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-size: 19px;
      font-weight: 1000;
      background: linear-gradient(135deg, #7d42ff, #1cc5f3);
      box-shadow: 0 10px 18px rgba(70, 48, 150, 0.22), inset 0 1px 0 rgba(255,255,255,0.38);
      cursor: pointer;
      touch-action: manipulation;
    }

    .toast {
      min-height: 38px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      border-radius: 8px;
      color: rgba(90, 45, 97, 0.86);
      font-size: 13px;
      font-weight: 900;
      background: rgba(255,255,255,0.58);
      border: 2px solid rgba(255,255,255,0.58);
      box-shadow: 0 10px 22px rgba(113, 38, 99, 0.1);
    }

    .hint-btn {
      height: 38px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-weight: 1000;
      background: linear-gradient(135deg, #ff4b93, #7d42ff);
      box-shadow: 0 10px 20px rgba(119, 39, 144, 0.24), inset 0 1px 0 rgba(255,255,255,0.42);
      cursor: pointer;
      touch-action: manipulation;
    }

    .bonus-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(54, 18, 70, 0.62);
      backdrop-filter: blur(8px);
    }

    .bonus-overlay.open { display: grid; }

    .bonus-panel {
      width: min(92vw, 420px);
      padding: 18px;
      border-radius: 14px;
      color: #5a2d61;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.95), transparent 35%),
        linear-gradient(145deg, #fff7d6, #ffc5e4 55%, #b8f0ff);
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 26px 80px rgba(57, 18, 78, 0.42);
    }

    .bonus-title {
      font-size: 24px;
      font-weight: 1000;
      color: #ff337f;
      text-shadow: 0 2px 0 #fff;
    }

    .bonus-sub {
      margin: 5px 0 12px;
      font-size: 13px;
      font-weight: 900;
      color: rgba(90, 45, 97, 0.78);
    }

    .ladder {
      display: grid;
      gap: 7px;
      margin: 12px 0;
    }

    .ladder-step {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 11px;
      border-radius: 8px;
      background: rgba(255,255,255,0.58);
      border: 2px solid rgba(255,255,255,0.62);
      font-weight: 1000;
    }

    .ladder-step.active {
      color: #fff;
      background: linear-gradient(135deg, #ff3c82, #7d42ff);
      box-shadow: 0 8px 24px rgba(126, 42, 144, 0.3);
    }

    .ladder-step.cleared {
      color: #18834d;
      background: rgba(199, 255, 219, 0.72);
    }

    .ladder-step.charging {
      animation: ladder-charge 760ms ease-in-out infinite;
    }

    .ladder-step.success {
      animation: ladder-success 640ms ease both;
    }

    .ladder-step.fail {
      animation: ladder-fail 620ms ease both;
    }

    .bonus-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .bonus-btn {
      height: 42px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-weight: 1000;
      background: linear-gradient(135deg, #ff4b93, #ffb82e);
      box-shadow: 0 10px 20px rgba(119, 39, 144, 0.2), inset 0 1px 0 rgba(255,255,255,0.42);
      cursor: pointer;
    }

    .bonus-btn.secondary {
      background: linear-gradient(135deg, #7d42ff, #1cc5f3);
    }

    .score-pop {
      position: absolute;
      left: calc(9px + var(--c) * var(--cell) + var(--cell) * 0.34);
      top: calc(9px + var(--r) * var(--cell) + var(--cell) * 0.18);
      z-index: 4;
      min-width: 58px;
      padding: 5px 7px;
      border-radius: 8px;
      color: #fff;
      font-weight: 1000;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      background: linear-gradient(135deg, #ff3c82, #ffb82e);
      text-shadow: 0 1px 0 rgba(70, 20, 82, 0.4);
      box-shadow: 0 8px 18px rgba(126, 42, 99, 0.28);
      animation: score-pop 860ms ease both;
    }

    .score-pop.combo { background: linear-gradient(135deg, #7d42ff, #1cc5f3); }

    .fragment-flight {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 80;
      width: 18px;
      height: 18px;
      border-radius: 45% 55% 48% 52%;
      pointer-events: none;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.95) 0 18%, transparent 19%),
        linear-gradient(135deg, #fff48d, #ffb82e 55%, #ff6d2e);
      box-shadow: 0 0 12px rgba(255, 222, 66, 0.9), 0 7px 14px rgba(112, 46, 76, 0.22);
      transform: translate(var(--sx), var(--sy)) scale(0.62) rotate(0deg);
      animation: fragment-fly 720ms cubic-bezier(.18, .86, .22, 1) forwards;
      animation-delay: var(--delay);
    }

    .fragment-flight::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(255,255,255,0.72), transparent 58%);
      opacity: 0.75;
      z-index: -1;
    }

    .stat.fragment-pulse {
      animation: fragment-bank-pulse 420ms ease both;
    }

    .stat.fragment-charge {
      animation: fragment-charge 980ms ease-in-out both;
    }

    .clear-burst {
      position: absolute;
      left: calc(9px + var(--c) * var(--cell) + var(--cell) * 0.5);
      top: calc(9px + var(--r) * var(--cell) + var(--cell) * 0.5);
      z-index: 3;
      width: calc(var(--cell) * var(--burst-size));
      height: calc(var(--cell) * var(--burst-size));
      margin-left: calc(var(--cell) * var(--burst-size) * -0.5);
      margin-top: calc(var(--cell) * var(--burst-size) * -0.5);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: burst-pop 760ms ease-out both;
    }

    .clear-burst::before,
    .clear-burst::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }

    .clear-burst::before {
      border: max(3px, calc(var(--cell) * 0.055)) solid rgba(255,255,255,0.92);
      box-shadow: 0 0 24px rgba(255,255,255,0.9), inset 0 0 22px rgba(255,255,255,0.42);
    }

    .clear-burst::after {
      background:
        radial-gradient(circle, rgba(255,255,255,0.95) 0 9%, transparent 10% 100%),
        conic-gradient(from 12deg, rgba(255,72,145,0.95), rgba(255,214,46,0.88), rgba(64,220,255,0.92), rgba(140,70,255,0.88), rgba(255,72,145,0.95));
      mask: radial-gradient(circle, transparent 0 31%, #000 32% 40%, transparent 41% 100%);
      opacity: 0.92;
      animation: burst-spin 760ms ease-out both;
    }

    .clear-burst.tier-10 {
      z-index: 5;
      animation-duration: 920ms;
    }

    .clear-burst.tier-10::before {
      border-width: max(4px, calc(var(--cell) * 0.08));
      box-shadow: 0 0 30px rgba(255,214,46,0.9), 0 0 52px rgba(255,72,145,0.44), inset 0 0 26px rgba(255,255,255,0.5);
    }

    .clear-burst.tier-10::after {
      background:
        repeating-conic-gradient(from 10deg, rgba(255,255,255,0.95) 0 8deg, transparent 8deg 18deg),
        conic-gradient(from 20deg, rgba(255,72,145,0.96), rgba(255,214,46,0.92), rgba(45,219,123,0.84), rgba(64,220,255,0.96), rgba(140,70,255,0.9), rgba(255,72,145,0.96));
      mask: radial-gradient(circle, transparent 0 24%, #000 25% 49%, transparent 50% 100%);
    }

    .clear-burst.tier-20 {
      z-index: 6;
      animation: mega-burst 1120ms ease-out both;
    }

    .clear-burst.tier-20::before {
      border-width: max(5px, calc(var(--cell) * 0.1));
      box-shadow: 0 0 42px rgba(255,255,255,1), 0 0 82px rgba(255,72,145,0.62), 0 0 96px rgba(64,220,255,0.48);
    }

    .clear-burst.tier-20::after {
      background:
        repeating-conic-gradient(from -12deg, rgba(255,255,255,1) 0 7deg, transparent 7deg 15deg),
        conic-gradient(from 0deg, #ff3d89, #ffd52e, #39df78, #40dcff, #8c46ff, #ff3d89);
      mask: radial-gradient(circle, transparent 0 18%, #000 19% 58%, transparent 59% 100%);
      animation-duration: 1120ms;
    }

    .confetti {
      position: absolute;
      left: calc(9px + var(--c) * var(--cell) + var(--cell) * 0.5);
      top: calc(9px + var(--r) * var(--cell) + var(--cell) * 0.5);
      z-index: 7;
      width: 7px;
      height: 13px;
      border-radius: 3px;
      background: hsl(var(--hue), 92%, 60%);
      pointer-events: none;
      animation: confetti-fly 1040ms ease-out both;
      transform: rotate(var(--rot));
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    @keyframes candy-clear {
      0% { opacity: 1; transform: scale(1); filter: brightness(1.1) drop-shadow(0 7px 8px rgba(89, 31, 93, 0.22)); }
      55% { opacity: 1; transform: scale(1.18) rotate(8deg); filter: brightness(1.35) drop-shadow(0 0 18px rgba(255,255,255,0.9)); }
      100% { opacity: 0; transform: scale(0.22) rotate(-14deg); }
    }

    @keyframes candy-enter {
      0% { opacity: 0; transform: translateY(calc(var(--cell) * -1.2)) scale(0.82); }
      74% { opacity: 1; transform: translateY(4px) scale(1.04); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes candy-settle {
      0% { transform: translateY(calc(var(--cell) * -0.6)) scale(0.96); }
      70% { transform: translateY(3px) scale(1.03); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes candy-vacuum {
      0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); filter: brightness(1.05) drop-shadow(0 7px 8px rgba(89, 31, 93, 0.22)); }
      55% { opacity: 1; transform: translate(calc(var(--pull-x) * var(--cell) * 0.62), calc(var(--pull-y) * var(--cell) * 0.62)) scale(0.72) rotate(160deg); filter: brightness(1.25) drop-shadow(0 0 20px rgba(255,255,255,0.8)); }
      100% { opacity: 0; transform: translate(calc(var(--pull-x) * var(--cell)), calc(var(--pull-y) * var(--cell))) scale(0.05) rotate(420deg); }
    }

    @keyframes candy-spit {
      0% { opacity: 0; transform: translate(calc(var(--pull-x) * var(--cell)), calc(var(--pull-y) * var(--cell))) scale(0.08) rotate(-240deg); filter: brightness(1.5) drop-shadow(0 0 18px rgba(255,255,255,0.9)); }
      72% { opacity: 1; transform: translate(-3px, 2px) scale(1.08) rotate(8deg); }
      100% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
    }

    @keyframes hint-hop {
      0%, 100% { transform: translateY(0) scale(1); }
      42% { transform: translateY(-7px) scale(1.04); }
    }

    @keyframes score-pop {
      0% { opacity: 0; transform: translateY(10px) scale(0.76); }
      18% { opacity: 1; transform: translateY(-4px) scale(1.08); }
      100% { opacity: 0; transform: translateY(-34px) scale(0.94); }
    }

    @keyframes burst-pop {
      0% { opacity: 0; transform: scale(0.22); filter: brightness(1.2); }
      18% { opacity: 1; transform: scale(0.72); }
      68% { opacity: 0.92; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.3); filter: brightness(1.45); }
    }

    @keyframes burst-spin {
      0% { transform: rotate(0deg) scale(0.4); opacity: 0; }
      24% { opacity: 1; }
      100% { transform: rotate(220deg) scale(1.08); opacity: 0; }
    }

    @keyframes mega-burst {
      0% { opacity: 0; transform: scale(0.18) rotate(-8deg); }
      16% { opacity: 1; transform: scale(0.7) rotate(0deg); }
      58% { opacity: 1; transform: scale(1.12) rotate(7deg); }
      100% { opacity: 0; transform: scale(1.52) rotate(18deg); }
    }

    @keyframes confetti-fly {
      0% { opacity: 0; transform: translate(0, 0) scale(0.5) rotate(var(--rot)); }
      14% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(var(--dx) * var(--cell)), calc(var(--dy) * var(--cell))) scale(1) rotate(calc(var(--rot) + 260deg)); }
    }

    @keyframes fragment-fly {
      0% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.55) rotate(-25deg); filter: brightness(1.25); }
      18% { opacity: 1; transform: translate(calc(var(--sx) + var(--arc-x)), calc(var(--sy) - 34px)) scale(1.05) rotate(45deg); }
      72% { opacity: 1; transform: translate(var(--mx), calc(var(--ty) - 46px)) scale(0.92) rotate(190deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.28) rotate(360deg); filter: brightness(1.45); }
    }

    @keyframes fragment-bank-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 24px rgba(150, 58, 113, 0.12), inset 0 1px 0 rgba(255,255,255,0.82); }
      45% { transform: scale(1.06); box-shadow: 0 0 0 4px rgba(255, 214, 46, 0.38), 0 12px 28px rgba(150, 58, 113, 0.22), inset 0 1px 0 rgba(255,255,255,0.9); }
    }

    @keyframes fragment-charge {
      0% { transform: scale(1); filter: brightness(1); }
      30% { transform: scale(1.05); filter: brightness(1.28); box-shadow: 0 0 0 5px rgba(255, 214, 46, 0.32), 0 0 30px rgba(255, 184, 46, 0.42), inset 0 1px 0 rgba(255,255,255,0.9); }
      70% { transform: scale(1.08); filter: brightness(1.45); box-shadow: 0 0 0 8px rgba(255, 214, 46, 0.16), 0 0 42px rgba(255, 68, 145, 0.42), inset 0 1px 0 rgba(255,255,255,0.95); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    @keyframes ladder-charge {
      0%, 100% { filter: brightness(1); transform: scale(1); }
      50% { filter: brightness(1.36); transform: scale(1.025); box-shadow: 0 0 28px rgba(255, 214, 46, 0.56); }
    }

    @keyframes ladder-success {
      0% { transform: scale(1); filter: brightness(1); }
      35% { transform: scale(1.06); filter: brightness(1.55); box-shadow: 0 0 32px rgba(76, 255, 158, 0.72); }
      100% { transform: scale(1); filter: brightness(1.05); }
    }

    @keyframes ladder-fail {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      20% { transform: scale(1.05) rotate(-1deg); filter: brightness(1.5); }
      42% { transform: scale(0.95) rotate(2deg); filter: brightness(0.75) saturate(0.7); box-shadow: 0 0 34px rgba(255, 61, 137, 0.62); }
      100% { transform: scale(1) rotate(0deg); filter: brightness(0.95); }
    }

    @keyframes wild-idle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes wild-spin {
      0% { transform: rotate(0deg) scale(1.06); }
      100% { transform: rotate(360deg) scale(1.06); }
    }

    @media (max-height: 760px) {
      :root { --cell: clamp(31px, 10.1vw, 50px); }
      .app { gap: 6px; grid-template-rows: minmax(98px, auto) minmax(0, 1fr) 42px; padding-top: max(7px, env(safe-area-inset-top)); padding-bottom: max(7px, env(safe-area-inset-bottom)); }
      .topbar { min-height: 92px; }
      .brand-title { font-size: clamp(22px, 7vw, 34px); }
      .brand-sub { display: none; }
      .stat { padding: 7px 9px; }
      .value { font-size: 20px; }
    }

    @media (max-width: 390px) {
      :root { --cell: clamp(30px, 10vw, 48px); }
      .toast { font-size: 12px; }
      .hint-btn { padding: 0 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">Sugar Pop</div>
        <div class="brand-sub">封閉測試錢包 - Jackpot Chase</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="label">Credits</div>
          <div class="value" id="credits">1,000</div>
        </div>
        <div class="stat">
          <div class="label">Bet</div>
          <div class="value" id="bet">10</div>
        </div>
        <div class="stat">
          <div class="label">Total Win</div>
          <div class="value" id="totalWin">0</div>
        </div>
        <div class="stat">
          <div class="label">Round Win</div>
          <div class="value" id="roundWin">0</div>
        </div>
        <div class="stat">
        <div class="label">Jackpot Fragments</div>
          <div class="value" id="fragments">0/10</div>
        </div>
        <div class="stat">
          <div class="label">Chain</div>
          <div class="value" id="chain">x1.0</div>
        </div>
      </div>
    </header>

    <section class="board-zone">
      <div class="board" id="board" aria-label="candy board"></div>
    </section>

    <section class="controls">
      <div class="bet-controls">
        <button class="bet-btn" id="betDown" type="button" aria-label="decrease bet">-</button>
        <button class="bet-btn" id="betUp" type="button" aria-label="increase bet">+</button>
      </div>
      <div class="toast" id="toast">普通消去不派彩，收集 Jackpot 碎片進入階梯挑戰。</div>
      <button class="hint-btn" id="hint" type="button">提示</button>
    </section>
  </main>

  <section class="bonus-overlay" id="bonusOverlay" aria-label="Jackpot Chase Bonus">
    <div class="bonus-panel">
      <div class="bonus-title">Jackpot Chase</div>
      <div class="bonus-sub" id="bonusSub">選擇收下目前獎金，或繼續挑戰下一層。</div>
      <div class="ladder" id="ladder"></div>
      <div class="bonus-actions">
        <button class="bonus-btn secondary" id="collectBonus" type="button">收下</button>
        <button class="bonus-btn" id="gambleBonus" type="button">繼續挑戰</button>
      </div>
    </div>
  </section>
  <script>
    const cols = 7;
    const rows = 9;
    const candyTypes = 5;
    const refillNeighborBias = 0.25;
    const minGroup = 3;
    const wildCreateThreshold = 6;
    const mathConfig = {
      initialCredits: 1000,
      minBet: 10,
      maxBet: 100,
      betStep: 10,
      fragmentTarget: 10,
      fragmentAwards: { 6: 1, 10: 2, 20: 5 },
      bonusMultipliers: [5, 10, 20, 50, 100],
      bonusSuccessRates: [0.93, 0.8, 0.65, 0.454, 0.3],
      consolationMultiplier: 0
    };

    const state = {
      board: [],
      combo: 0,
      busy: false,
      hint: [],
      clearing: new Set(),
      entering: new Set(),
      settling: new Set(),
      invalid: new Set(),
      reshuffling: false,
      spawning: false,
      popups: [],
      bursts: [],
      hintTimer: null,
      audio: null,
      musicTimer: null,
      fragmentFlights: 0
    };

    const walletState = {
      credits: mathConfig.initialCredits,
      bet: 10,
      totalWin: 0,
      roundWin: 0,
      fragments: 0
    };

    const roundState = {
      actionId: 0,
      chainCount: 0,
      baseFragments: 0,
      bonusPending: false,
      bonusStep: 0,
      bonusOffer: 0,
      bonusSeed: 0,
      rngNonce: 0,
      boardHash: ""
    };

    const els = {
      board: document.querySelector("#board"),
      credits: document.querySelector("#credits"),
      bet: document.querySelector("#bet"),
      totalWin: document.querySelector("#totalWin"),
      roundWin: document.querySelector("#roundWin"),
      fragments: document.querySelector("#fragments"),
      chain: document.querySelector("#chain"),
      toast: document.querySelector("#toast"),
      hint: document.querySelector("#hint"),
      betDown: document.querySelector("#betDown"),
      betUp: document.querySelector("#betUp"),
      bonusOverlay: document.querySelector("#bonusOverlay"),
      bonusSub: document.querySelector("#bonusSub"),
      ladder: document.querySelector("#ladder"),
      collectBonus: document.querySelector("#collectBonus"),
      gambleBonus: document.querySelector("#gambleBonus")
    };

    function keyOf(pos) {
      return `${pos.r},${pos.c}`;
    }

    function parseKey(key) {
      const [r, c] = key.split(",").map(Number);
      return { r, c };
    }

    function inBounds(r, c) {
      return r >= 0 && r < rows && c >= 0 && c < cols;
    }

    function randomCandy() {
      return Math.floor(Math.random() * candyTypes);
    }

    function makeCell(type = randomCandy(), special = null) {
      return normalizeCell({ type, special }) || { type: randomCandy(), special: null };
    }

    function makeWildCell() {
      return { type: 5, special: "wild" };
    }

    function isOrdinaryCell(cell) {
      return !!cell && !cell.special && Number.isInteger(cell.type) && cell.type >= 0 && cell.type < candyTypes;
    }

    function normalizeCell(cell) {
      if (!cell) return null;
      if (cell.special === "wild") return makeWildCell();
      if (Number.isInteger(cell.type) && cell.type >= 0 && cell.type < candyTypes) {
        return { type: cell.type, special: null };
      }
      return { type: randomCandy(), special: null };
    }

    function normalizeBoard() {
      for (let r = 0; r < rows; r += 1) {
        for (let c = 0; c < cols; c += 1) {
          state.board[r][c] = normalizeCell(state.board[r][c]);
        }
      }
    }

    function biasedRefillCandy(r, c) {
      if (Math.random() >= refillNeighborBias) return randomCandy();
      const options = [];
      for (const next of [
        { r: r + 1, c },
        { r, c: c - 1 },
        { r, c: c + 1 },
        { r: r - 1, c }
      ]) {
        if (!inBounds(next.r, next.c)) continue;
        const cell = state.board[next.r][next.c];
        if (isOrdinaryCell(cell)) options.push(cell.type);
      }
      if (!options.length) return randomCandy();
      return options[Math.floor(Math.random() * options.length)];
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function formatScore(value) {
      return Math.round(value).toLocaleString("en-US");
    }

    function money(value) {
      return Math.round(value).toLocaleString("en-US");
    }

    function setToast(text) {
      els.toast.textContent = text;
    }

    function updateUI() {
      els.credits.textContent = money(walletState.credits);
      els.bet.textContent = money(walletState.bet);
      els.totalWin.textContent = money(walletState.totalWin);
      els.roundWin.textContent = money(walletState.roundWin);
      els.fragments.textContent = `${Math.min(walletState.fragments, mathConfig.fragmentTarget)}/${mathConfig.fragmentTarget}`;
      els.chain.textContent = `x${comboMultiplier().toFixed(1)}`;
      els.betDown.disabled = state.busy || walletState.bet <= mathConfig.minBet;
      els.betUp.disabled = state.busy || walletState.bet >= mathConfig.maxBet || walletState.bet + mathConfig.betStep > walletState.credits;
    }

    function boardHash() {
      let hash = 2166136261;
      const text = state.board.map(row => row.map(cell => cell ? `${cell.type}:${cell.special || ""}` : "x").join("|")).join("/");
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(16);
    }

    function nextActionMeta() {
      roundState.actionId += 1;
      roundState.rngNonce = Math.floor(Math.random() * 1e9);
      roundState.boardHash = boardHash();
      return {
        actionId: roundState.actionId,
        rngNonce: roundState.rngNonce,
        boardHash: roundState.boardHash
      };
    }

    function changeBet(delta) {
      if (state.busy || roundState.bonusPending) return;
      const next = Math.max(mathConfig.minBet, Math.min(mathConfig.maxBet, walletState.bet + delta));
      walletState.bet = Math.min(next, Math.max(mathConfig.minBet, walletState.credits));
      updateUI();
    }

    function render() {
      normalizeBoard();
      els.board.innerHTML = "";
      els.board.classList.toggle("reshuffling", state.reshuffling);
      els.board.classList.toggle("spawning", state.spawning);
      for (let r = 0; r < rows; r += 1) {
        for (let c = 0; c < cols; c += 1) {
          const cell = state.board[r][c];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "cell";
          button.dataset.r = r;
          button.dataset.c = c;
          button.style.setProperty("--pull-x", ((cols - 1) / 2) - c);
          button.style.setProperty("--pull-y", ((rows - 1) / 2) - r);
          button.setAttribute("aria-label", `candy ${r + 1}-${c + 1}`);
          const key = keyOf({ r, c });
          if (state.clearing.has(key)) button.classList.add("clearing");
          if (state.entering.has(key)) button.classList.add("entering");
          if (state.settling.has(key)) button.classList.add("settling");
          if (state.invalid.has(key)) button.classList.add("invalid");
          if (state.hint.some(pos => pos.r === r && pos.c === c)) button.classList.add("hint");
          if (cell) {
            const candy = document.createElement("div");
            candy.className = cell.special === "wild" ? "candy special-wild" : `candy type-${isOrdinaryCell(cell) ? cell.type : 0}`;
            button.appendChild(candy);
          }
          els.board.appendChild(button);
        }
      }

      for (const popup of state.popups) {
        const badge = document.createElement("div");
        badge.className = `score-pop ${popup.combo ? "combo" : ""}`;
        badge.style.setProperty("--r", popup.r);
        badge.style.setProperty("--c", popup.c);
        badge.textContent = popup.text;
        els.board.appendChild(badge);
      }

      for (const burst of state.bursts) {
        const ring = document.createElement("div");
        ring.className = `clear-burst tier-${burst.tier}`;
        ring.style.setProperty("--r", burst.r);
        ring.style.setProperty("--c", burst.c);
        ring.style.setProperty("--burst-size", burst.size);
        els.board.appendChild(ring);
        for (const confetti of burst.confetti || []) {
          const bit = document.createElement("div");
          bit.className = "confetti";
          bit.style.setProperty("--r", burst.r);
          bit.style.setProperty("--c", burst.c);
          bit.style.setProperty("--dx", confetti.dx);
          bit.style.setProperty("--dy", confetti.dy);
          bit.style.setProperty("--rot", `${confetti.rot}deg`);
          bit.style.setProperty("--hue", confetti.hue);
          els.board.appendChild(bit);
        }
      }
    }

    function createBoard() {
      state.board = randomPlayableBoard();
    }

    function randomBoard() {
      return Array.from({ length: rows }, () =>
        Array.from({ length: cols }, () => makeCell())
      );
    }

    function randomPlayableBoard() {
      let board;
      do {
        board = randomBoard();
        state.board = board;
      } while (!findClickableGroups().length);
      return board;
    }

    function getConnectedGroup(start) {
      const startCell = state.board[start.r][start.c];
      if (!startCell || startCell.special === "wild") return [];
      const target = startCell.type;
      const seen = new Set([keyOf(start)]);
      const queue = [start];
      const group = [];
      while (queue.length) {
        const pos = queue.shift();
        group.push(pos);
        for (const next of [
          { r: pos.r - 1, c: pos.c },
          { r: pos.r + 1, c: pos.c },
          { r: pos.r, c: pos.c - 1 },
          { r: pos.r, c: pos.c + 1 }
        ]) {
          if (!inBounds(next.r, next.c)) continue;
          const key = keyOf(next);
          const cell = state.board[next.r][next.c];
          if (seen.has(key) || !cell || cell.special === "wild" || cell.type !== target) continue;
          seen.add(key);
          queue.push(next);
        }
      }
      return group;
    }

    function findClickableGroups() {
      const groups = [];
      const visited = new Set();
      for (let r = 0; r < rows; r += 1) {
        for (let c = 0; c < cols; c += 1) {
          const key = keyOf({ r, c });
          if (visited.has(key) || !state.board[r][c]) continue;
          const group = getConnectedGroup({ r, c });
          for (const pos of group) visited.add(keyOf(pos));
          if (group.length >= minGroup) groups.push(group);
        }
      }
      groups.sort((a, b) => b.length - a.length);
      return groups;
    }

    function clearIdleHint() {
      if (state.hintTimer) clearTimeout(state.hintTimer);
      state.hintTimer = null;
      state.hint = [];
    }

    function resetIdleHint() {
      clearIdleHint();
      state.hintTimer = setTimeout(() => {
        if (state.busy) return;
        showHint();
      }, 5200);
    }

    function showHint() {
      const groups = findClickableGroups();
      if (!groups.length) {
        setToast("暫時沒有可消群組，糖果機正在重整。");
        return;
      }
      state.hint = groups[0];
      setToast(`提示：這裡有 ${groups[0].length} 顆可消糖果。`);
      render();
      resetIdleHint();
    }

    function comboMultiplier() {
      return actionMultiplier(state.combo);
    }

    function actionMultiplier(comboWaves) {
      if (!comboWaves) return 1;
      return 1 + comboWaves * 0.25 + Math.max(0, comboWaves - 1) * 0.15;
    }

    function groupAnchor(group, clicked) {
      if (clicked) return clicked;
      const total = group.reduce((sum, pos) => ({ r: sum.r + pos.r, c: sum.c + pos.c }), { r: 0, c: 0 });
      return {
        r: Math.round(total.r / group.length),
        c: Math.round(total.c / group.length)
      };
    }

    function findWildTriggers() {
      const triggers = [];
      for (let r = 0; r < rows; r += 1) {
        for (let c = 0; c < cols; c += 1) {
          const wild = state.board[r][c];
          if (!wild || wild.special !== "wild") continue;
          const wildKey = keyOf({ r, c });
          const cellsByKey = new Map([[wildKey, { r, c }]]);
          const groups = [];
          const groupSigs = new Set();
          for (const next of [
            { r: r - 1, c },
            { r: r + 1, c },
            { r, c: c - 1 },
            { r, c: c + 1 }
          ]) {
            if (!inBounds(next.r, next.c)) continue;
            const neighbor = state.board[next.r][next.c];
            if (!neighbor || neighbor.special === "wild") continue;
            const colorGroup = getConnectedGroup(next);
            if (colorGroup.length + 1 < minGroup) continue;
            const sig = colorGroup.map(keyOf).sort().join("|");
            if (groupSigs.has(sig)) continue;
            groupSigs.add(sig);
            groups.push(colorGroup);
            for (const pos of colorGroup) {
              cellsByKey.set(keyOf(pos), pos);
            }
          }
          if (groups.length) {
            triggers.push({
              cells: Array.from(cellsByKey.values()),
              wild: { r, c },
              groups,
              maxEffectiveSize: Math.max(...groups.map(group => group.length + 1))
            });
          }
        }
      }
      return triggers;
    }

    function collapseBoard() {
      const moved = [];
      for (let c = 0; c < cols; c += 1) {
        const stack = [];
        for (let r = rows - 1; r >= 0; r -= 1) {
          if (state.board[r][c]) stack.push(state.board[r][c]);
        }
        for (let r = rows - 1; r >= 0; r -= 1) {
          const next = stack[rows - 1 - r] || null;
          if (state.board[r][c] !== next && next) moved.push({ r, c });
          state.board[r][c] = next;
        }
      }
      return moved;
    }

    function refillBoard() {
      const filled = [];
      for (let r = 0; r < rows; r += 1) {
        for (let c = 0; c < cols; c += 1) {
          if (!state.board[r][c]) {
            state.board[r][c] = makeCell(biasedRefillCandy(r, c));
            filled.push({ r, c });
          }
        }
      }
      normalizeBoard();
      return filled;
    }

    async function reshuffleDeadBoard() {
      if (findClickableGroups().length) return false;
      state.busy = true;
      state.hint = [];
      clearIdleHint();
      setToast("\u6c92\u6709\u53ef\u6d88\u7cd6\u679c\uff0c\u5168\u90e8\u5438\u9032\u7cd6\u679c\u6a5f...");
      playSound("shuffle");
      state.reshuffling = true;
      render();
      await wait(700);

      state.board = randomPlayableBoard();
      state.reshuffling = false;
      state.spawning = true;
      state.entering = new Set(
        Array.from({ length: rows }, (_, r) =>
          Array.from({ length: cols }, (_, c) => keyOf({ r, c }))
        ).flat()
      );
      setToast("\u65b0\u7cd6\u679c\u5410\u51fa\u4f86\u4e86\uff01");
      render();
      await wait(620);

      state.spawning = false;
      state.entering.clear();
      state.busy = false;
      updateUI();
      render();
      resetIdleHint();
      return true;
    }

    function showScorePopup(anchor, gain, combo) {
      const text = typeof gain === "number" ? `+${gain}` : gain;
      state.popups.push({
        r: Math.max(0, anchor.r - 0.2),
        c: Math.min(cols - 1, anchor.c + 0.15),
        text: combo > 0 ? `${text}  x${actionMultiplier(combo).toFixed(1)}` : text,
        combo: combo > 0
      });
    }

    function boardPoint(anchor) {
      const rect = els.board.getBoundingClientRect();
      const cell = rect.width / cols;
      return {
        x: rect.left + cell * (anchor.c + 0.5),
        y: rect.top + cell * (anchor.r + 0.5)
      };
    }

    function fragmentTargetPoint() {
      const rect = els.fragments.getBoundingClientRect();
      return {
        x: rect.left + rect.width * 0.5,
        y: rect.top + rect.height * 0.5
      };
    }

    async function flyFragments(anchor, count) {
      if (!count) return;
      const start = boardPoint(anchor);
      const target = fragmentTargetPoint();
      const flights = [];
      state.fragmentFlights += count;
      for (let i = 0; i < count; i += 1) {
        const chip = document.createElement("div");
        chip.className = "fragment-flight";
        const offsetX = (i - (count - 1) / 2) * 9;
        const offsetY = (i % 2) * -7;
        chip.style.setProperty("--sx", `${start.x + offsetX}px`);
        chip.style.setProperty("--sy", `${start.y + offsetY}px`);
        chip.style.setProperty("--tx", `${target.x}px`);
        chip.style.setProperty("--ty", `${target.y}px`);
        chip.style.setProperty("--mx", `${(start.x + target.x) / 2 + (i - 1) * 10}px`);
        chip.style.setProperty("--arc-x", `${(i - (count - 1) / 2) * 18}px`);
        chip.style.setProperty("--delay", `${i * 82}ms`);
        document.body.appendChild(chip);
        flights.push(new Promise(resolve => {
          chip.addEventListener("animationend", () => {
            chip.remove();
            resolve();
          }, { once: true });
        }));
      }
      await Promise.all(flights);
      state.fragmentFlights = Math.max(0, state.fragmentFlights - count);
      const stat = els.fragments.closest(".stat");
      if (stat) {
        stat.classList.remove("fragment-pulse");
        void stat.offsetWidth;
        stat.classList.add("fragment-pulse");
      }
      playSound("claim");
    }

    async function animateFragmentCharge() {
      const stat = els.fragments.closest(".stat");
      if (!stat) return;
      stat.classList.remove("fragment-charge");
      void stat.offsetWidth;
      stat.classList.add("fragment-charge");
      playSound("wild");
      await wait(980);
      stat.classList.remove("fragment-charge");
    }

    function clearTier(count) {
      if (count >= 20) return 20;
      if (count >= 10) return 10;
      if (count >= 6) return 6;
      return 0;
    }

    function fragmentsForTier(tier) {
      if (tier >= 20) return mathConfig.fragmentAwards[20];
      if (tier >= 10) return mathConfig.fragmentAwards[10];
      if (tier >= 6) return mathConfig.fragmentAwards[6];
      return 0;
    }

    function tierMessage(tier, count) {
      if (tier >= 20) return `Candy Storm！${count} 顆超大消去！`;
      if (tier >= 10) return `Sugar Splash！${count} 顆大消去！`;
      if (tier >= 6) return `Sweet Burst！${count} 顆連成一片！`;
      return "";
    }

    function makeConfetti(tier) {
      if (tier < 20) return [];
      return Array.from({ length: 18 }, (_, i) => {
        const angle = (Math.PI * 2 * i) / 18;
        const spread = 2.5 + (i % 3) * 0.38;
        return {
          dx: Math.cos(angle) * spread,
          dy: Math.sin(angle) * spread - 0.25,
          rot: i * 31,
          hue: (i * 47) % 360
        };
      });
    }

    function showClearBurst(group, anchor, tier = clearTier(group.length)) {
      if (!tier) return 0;
      const bounds = group.reduce((box, pos) => ({
        minR: Math.min(box.minR, pos.r),
        maxR: Math.max(box.maxR, pos.r),
        minC: Math.min(box.minC, pos.c),
        maxC: Math.max(box.maxC, pos.c)
      }), { minR: rows, maxR: 0, minC: cols, maxC: 0 });
      const span = Math.max(bounds.maxR - bounds.minR + 1, bounds.maxC - bounds.minC + 1);
      const size = tier >= 20 ? Math.max(6.8, span + 2.8) : tier >= 10 ? Math.max(4.9, span + 2) : Math.max(3.2, span + 1.2);
      state.bursts = [{
        tier,
        r: anchor.r,
        c: anchor.c,
        size,
        confetti: makeConfetti(tier)
      }];
      return tier;
    }

    function pickWildSpawnPosition(group, preferredAnchor) {
      const candidates = group.filter(pos => {
        const cell = state.board[pos.r]?.[pos.c];
        return isOrdinaryCell(cell);
      });
      if (!candidates.length) {
        return preferredAnchor && inBounds(preferredAnchor.r, preferredAnchor.c) ? preferredAnchor : group[0];
      }
      const center = candidates.reduce((sum, pos) => ({
        r: sum.r + pos.r,
        c: sum.c + pos.c
      }), { r: 0, c: 0 });
      center.r /= candidates.length;
      center.c /= candidates.length;
      const weighted = candidates.map(pos => {
        const distance = Math.hypot(pos.r - center.r, pos.c - center.c);
        return {
          pos,
          weight: 1 / Math.pow(distance + 0.75, 2)
        };
      });
      let roll = Math.random() * weighted.reduce((sum, item) => sum + item.weight, 0);
      for (const item of weighted) {
        roll -= item.weight;
        if (roll <= 0) return item.pos;
      }
      return weighted[weighted.length - 1].pos;
    }

    async function collectFragments(tier, anchor) {
      const fragments = fragmentsForTier(tier);
      if (!fragments) return 0;
      await flyFragments(anchor, fragments);
      walletState.fragments += fragments;
      roundState.baseFragments += fragments;
      updateUI();
      return fragments;
    }

    async function maybeOpenBonus() {
      if (walletState.fragments < mathConfig.fragmentTarget || roundState.bonusPending) return false;
      updateUI();
      await animateFragmentCharge();
      walletState.fragments -= mathConfig.fragmentTarget;
      roundState.bonusPending = true;
      roundState.bonusStep = 0;
      roundState.bonusSeed = Math.round(walletState.bet * actionMultiplier(roundState.chainCount));
      roundState.bonusOffer = roundState.bonusSeed * mathConfig.bonusMultipliers[0];
      renderBonus();
      els.bonusOverlay.classList.add("open");
      setToast("Jackpot Chase！收下目前獎金或繼續挑戰。");
      playSound("clear-20");
      return true;
    }

    function renderBonus() {
      els.ladder.innerHTML = "";
      mathConfig.bonusMultipliers.forEach((multiplier, index) => {
        const step = document.createElement("div");
        step.className = `ladder-step ${index < roundState.bonusStep ? "cleared" : ""} ${index === roundState.bonusStep ? "active" : ""}`;
        step.innerHTML = `<span>Level ${index + 1}</span><span>x${multiplier}</span>`;
        els.ladder.appendChild(step);
      });
      const currentMultiplier = mathConfig.bonusMultipliers[Math.min(roundState.bonusStep, mathConfig.bonusMultipliers.length - 1)];
      roundState.bonusOffer = (roundState.bonusSeed || walletState.bet) * currentMultiplier;
      els.bonusSub.textContent = `目前可收下 ${money(roundState.bonusOffer)} credits。繼續挑戰可能升級，也可能挑戰失敗歸零。`;
      els.gambleBonus.disabled = roundState.bonusStep >= mathConfig.bonusMultipliers.length - 1;
    }

    async function animateLadderResult(kind) {
      const active = els.ladder.querySelector(".ladder-step.active");
      if (!active) return;
      active.classList.add("charging");
      playSound("wild");
      await wait(760);
      active.classList.remove("charging");
      active.classList.add(kind);
      playSound(kind === "success" ? "clear-10" : "invalid");
      await wait(620);
      active.classList.remove(kind);
    }

    function closeBonus() {
      roundState.bonusPending = false;
      roundState.bonusStep = 0;
      roundState.bonusOffer = 0;
      roundState.bonusSeed = 0;
      els.bonusOverlay.classList.remove("open");
      updateUI();
      render();
      resetIdleHint();
    }

    function collectBonus() {
      if (!roundState.bonusPending || state.busy) return;
      const win = roundState.bonusOffer || (roundState.bonusSeed || walletState.bet) * mathConfig.consolationMultiplier;
      walletState.roundWin += win;
      walletState.totalWin += win;
      walletState.credits += win;
      setToast(`Bonus 收下 +${money(win)} credits。`);
      playSound("claim");
      closeBonus();
    }

    async function gambleBonus() {
      if (!roundState.bonusPending || state.busy) return;
      state.busy = true;
      els.collectBonus.disabled = true;
      els.gambleBonus.disabled = true;
      const step = roundState.bonusStep;
      const successRate = mathConfig.bonusSuccessRates[Math.min(step, mathConfig.bonusSuccessRates.length - 1)];
      nextActionMeta();
      const success = Math.random() < successRate;
      await animateLadderResult(success ? "success" : "fail");
      if (success) {
        roundState.bonusStep = Math.min(roundState.bonusStep + 1, mathConfig.bonusMultipliers.length - 1);
        renderBonus();
        setToast(`階梯升級！目前 x${mathConfig.bonusMultipliers[roundState.bonusStep]}。`);
        playSound("clear-10");
      } else {
        const win = (roundState.bonusSeed || walletState.bet) * mathConfig.consolationMultiplier;
        walletState.roundWin += win;
        walletState.totalWin += win;
        walletState.credits += win;
        setToast(`挑戰失敗，Bonus +${money(win)} credits。`);
        playSound("invalid");
        closeBonus();
      }
      state.busy = false;
      els.collectBonus.disabled = false;
      updateUI();
    }

    async function animateClearWave(group, clicked, comboWaves, createWild, effectiveCount = group.length) {
      const anchor = groupAnchor(group, clicked);
      state.combo = comboWaves;
      state.clearing = new Set(group.map(keyOf));
      const tier = showClearBurst(group, anchor, clearTier(effectiveCount));
      const fragments = fragmentsForTier(tier);
      if (fragments) showScorePopup(anchor, `+${fragments} Frag`, comboWaves);
      render();
      const specialMessage = tierMessage(tier, effectiveCount);
      const comboText = comboWaves ? `Chain ${comboWaves}！` : "";
      setToast(createWild ? "百搭糖果形成！碎片正在收集。" : fragments ? `${specialMessage || comboText} +${fragments} Jackpot 碎片` : `${comboText}普通消去不派彩。`);
      playSound(tier ? `clear-${tier}` : comboWaves ? "combo" : "clear");
      if (createWild) playSound("wild");
      await wait(tier >= 20 ? 760 : tier >= 10 ? 560 : tier >= 6 ? 460 : 340);
      await collectFragments(tier, anchor);

      const wildSpawn = createWild ? pickWildSpawnPosition(group, anchor) : null;
      const wildSpawnKey = wildSpawn ? keyOf(wildSpawn) : "";
      for (const pos of group) {
        if (createWild && keyOf(pos) === wildSpawnKey) {
          state.board[pos.r][pos.c] = makeWildCell();
        } else {
          state.board[pos.r][pos.c] = null;
        }
      }
      normalizeBoard();
      state.clearing.clear();
      state.popups = [];
      state.bursts = [];

      const moved = collapseBoard();
      const filled = refillBoard();
      state.settling = new Set(moved.map(keyOf));
      state.entering = new Set(filled.map(keyOf));
      render();
      await wait(360);

      state.settling.clear();
      state.entering.clear();
      state.hint = [];
      updateUI();
      render();
      return { fragments, tier, anchor };
    }

    async function clearGroup(group, clicked) {
      state.busy = true;
      clearIdleHint();
      if (walletState.credits < walletState.bet) {
        setToast("Credits 不足，請降低 Bet。");
        playSound("invalid");
        state.busy = false;
        updateUI();
        return;
      }

      nextActionMeta();
      walletState.credits -= walletState.bet;
      walletState.roundWin = 0;
      roundState.chainCount = 0;
      roundState.baseFragments = 0;
      state.combo = 0;
      updateUI();

      await animateClearWave(group, clicked, 0, group.length >= wildCreateThreshold);

      let chain = 0;
      let guard = 0;
      while (guard < 12) {
        const wildTriggers = findWildTriggers();
        if (!wildTriggers.length) break;
        guard += 1;
        chain += 1;
        const clearKeys = new Set();
        const wave = [];
        for (const trigger of wildTriggers) {
          for (const pos of trigger.cells) {
            const key = keyOf(pos);
            if (clearKeys.has(key)) continue;
            clearKeys.add(key);
            wave.push(pos);
          }
        }
        const anchor = wildTriggers[0].wild;
        const maxSingleColorCount = Math.max(...wildTriggers.map(trigger => trigger.maxEffectiveSize || 0));
        await animateClearWave(wave, anchor, chain, maxSingleColorCount >= wildCreateThreshold, maxSingleColorCount);
      }

      state.combo = chain;
      roundState.chainCount = chain;
      updateUI();
      render();
      if (chain) {
        setToast(`Combo ${chain}！百搭連爆倍率 x${actionMultiplier(chain).toFixed(2)}，獎項只在 Bonus 結算。`);
        playSound("combo");
        await wait(420);
        state.popups = [];
      }

      if (walletState.fragments >= mathConfig.fragmentTarget) {
        await wait(260);
      }
      if (await maybeOpenBonus()) {
        state.busy = false;
        updateUI();
        render();
        return;
      }

      if (!findClickableGroups().length) {
        await reshuffleDeadBoard();
        return;
      }
      state.busy = false;
      updateUI();
      render();
      resetIdleHint();
    }
    async function handleClick(pos) {
      if (state.busy || roundState.bonusPending) return;
      startAudio();
      const group = getConnectedGroup(pos);
      if (group.length < minGroup) {
        state.invalid = new Set(group.map(keyOf));
        state.hint = [];
        render();
        setToast("至少 3 顆相連糖果才可以消去。");
        playSound("invalid");
        await wait(280);
        state.invalid.clear();
        if (!findClickableGroups().length) {
          await reshuffleDeadBoard();
          return;
        }
        render();
        resetIdleHint();
        return;
      }
      await clearGroup(group, pos);
    }

    els.board.addEventListener("click", event => {
      const cell = event.target.closest(".cell");
      if (!cell || !els.board.contains(cell)) return;
      handleClick({ r: Number(cell.dataset.r), c: Number(cell.dataset.c) });
    });

    els.hint.addEventListener("click", () => {
      startAudio();
      showHint();
    });

    function startAudio() {
      if (state.audio) {
        if (state.audio.state === "suspended") state.audio.resume();
        return state.audio;
      }
      const AudioContextClass = globalThis.AudioContext || globalThis.webkitAudioContext;
      if (!AudioContextClass) return null;
      state.audio = new AudioContextClass();
      startMusic();
      return state.audio;
    }

    function tone(freq, duration, volume, type, startTime) {
      const audio = state.audio;
      if (!audio) return;
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);
      const attack = Math.min(0.055, duration * 0.38);
      const release = Math.min(0.12, duration * 0.58);
      const releaseStart = Math.max(startTime + attack + 0.012, startTime + duration - release);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + attack);
      gain.gain.setValueAtTime(volume, releaseStart);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.connect(gain);
      gain.connect(audio.destination);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.08);
    }

    function playSound(kind) {
      const audio = startAudio();
      if (!audio) return;
      const now = audio.currentTime;
      if (kind === "invalid") {
        tone(180, 0.14, 0.04, "sine", now);
      } else if (kind === "clear") {
        tone(520, 0.16, 0.05, "sine", now);
        tone(760, 0.2, 0.04, "sine", now + 0.06);
      } else if (kind === "combo") {
        tone(620, 0.16, 0.055, "sine", now);
        tone(820, 0.19, 0.052, "sine", now + 0.06);
        tone(1040, 0.24, 0.042, "sine", now + 0.14);
      } else if (kind === "clear-6") {
        tone(587, 0.2, 0.05, "sine", now);
        tone(784, 0.24, 0.044, "sine", now + 0.08);
        tone(988, 0.26, 0.034, "sine", now + 0.18);
      } else if (kind === "clear-10") {
        tone(523, 0.24, 0.052, "sine", now);
        tone(659, 0.3, 0.048, "sine", now + 0.08);
        tone(880, 0.34, 0.044, "sine", now + 0.18);
        tone(1175, 0.36, 0.032, "sine", now + 0.32);
      } else if (kind === "clear-20") {
        tone(392, 0.34, 0.05, "sine", now);
        tone(523, 0.42, 0.05, "sine", now + 0.08);
        tone(784, 0.48, 0.046, "sine", now + 0.2);
        tone(1047, 0.52, 0.038, "sine", now + 0.36);
        tone(1568, 0.46, 0.026, "sine", now + 0.56);
      } else if (kind === "wild") {
        tone(784, 0.22, 0.044, "sine", now);
        tone(1047, 0.28, 0.038, "sine", now + 0.1);
        tone(1568, 0.34, 0.026, "sine", now + 0.24);
      } else if (kind === "claim") {
        tone(659, 0.2, 0.04, "sine", now);
        tone(880, 0.26, 0.036, "sine", now + 0.08);
        tone(1319, 0.32, 0.026, "sine", now + 0.2);
      } else if (kind === "shuffle") {
        tone(330, 0.32, 0.045, "sine", now);
        tone(247, 0.42, 0.04, "sine", now + 0.12);
        tone(523, 0.38, 0.035, "sine", now + 0.34);
      }
    }

    function softPad(freqs, startTime, duration = 1.65) {
      for (const freq of freqs) {
        tone(freq, duration, 0.007, "sine", startTime);
        tone(freq * 2, duration * 0.72, 0.003, "sine", startTime + 0.08);
      }
    }

    function startMusic() {
      if (state.musicTimer || !state.audio) return;
      const chords = [
        [392, 523, 659],
        [440, 554, 659],
        [349, 440, 587],
        [392, 494, 659]
      ];
      const bass = [196, 220, 175, 196];
      const melody = [
        [784, 880, 988, 880],
        [659, 784, 880, 0],
        [698, 784, 988, 880],
        [784, 659, 698, 0],
        [880, 988, 1175, 988],
        [784, 880, 988, 0],
        [698, 784, 880, 784],
        [659, 698, 784, 0]
      ];
      const sparkle = [1319, 1568, 1760, 1976];
      let bar = 0;
      const playBar = () => {
        if (!state.audio || state.audio.state === "suspended") return;
        const now = state.audio.currentTime + 0.04;
        const index = bar % chords.length;
        softPad(chords[index], now, 1.68);
        tone(bass[index], 0.56, 0.007, "sine", now + 0.04);
        const phrase = melody[bar % melody.length];
        for (let i = 0; i < phrase.length; i += 1) {
          const note = phrase[i];
          if (note) tone(note, 0.42, 0.012, "sine", now + 0.16 + i * 0.38);
        }
        if (bar % 2 === 1) tone(sparkle[bar % sparkle.length], 0.28, 0.0045, "sine", now + 1.38);
        bar += 1;
      };
      playBar();
      state.musicTimer = setInterval(playBar, 1760);
    }

    document.addEventListener("gesturestart", event => event.preventDefault());
    document.addEventListener("dblclick", event => event.preventDefault(), { passive: false });
    els.betDown.addEventListener("click", () => changeBet(-mathConfig.betStep));
    els.betUp.addEventListener("click", () => changeBet(mathConfig.betStep));
    els.collectBonus.addEventListener("click", collectBonus);
    els.gambleBonus.addEventListener("click", gambleBonus);

    createBoard();
    updateUI();
    render();
    resetIdleHint();
  </script>
</body>
</html>
