          text: `\u6d88\u53bb 10 \u9846${candyNames[color]}\u7cd6`
        }),
        () => ({
          type: "special",
          special: "striped",
          target: 2,
          reward: { kind: "bonus", value: 0.8 },
          text: "\u89f8\u767c 2 \u6b21\u689d\u7d0b\u7cd6"
        }),
        () => ({
          type: "singleClear",
          target: 10,
          reward: { kind: "percent", value: 0.1 },
          text: "\u55ae\u6b21\u6d88\u53bb 10 \u9846\u4ee5\u4e0a"
        })
      ];
      const medium = [
        () => ({
          type: "color",
          color,
          target: 24,
          reward: { kind: "bonus", value: 2 },
          text: `\u6d88\u53bb 24 \u9846${candyNames[color]}\u7cd6`
        }),
        () => ({
          type: "special",
          special: "wrapped",
          target: 2,
          reward: { kind: "percent", value: 0.18 },
          text: "\u89f8\u767c 2 \u6b21\u5305\u88dd\u7cd6"
        }),
        () => ({
          type: "combo",
          target: 3,
          reward: { kind: "percent", value: 0.2 },
          text: "\u9054\u6210 3 \u6ce2 Combo"
        })
      ];
      const jackpot = [
        () => ({
          type: "combo",
          target: 5,
          reward: { kind: "multiplier", value: 2 },
          text: "\u9054\u6210 5 \u6ce2 Combo"
        }),
        () => ({
          type: "colorCombo",
          target: 1,
          reward: { kind: "multiplier", value: 2.5 },
          text: "\u89f8\u767c\u5f69\u8679\u7cd6\u9023\u52d5"
        }),
        () => ({
          type: "color",
          color,
          target: 60,
          reward: { kind: "multiplier", value: 3 },
          text: `\u6d88\u53bb 60 \u9846${candyNames[color]}\u7cd6`
        })
      ];
      const pool = tier === "jackpot" ? jackpot : tier === "medium" ? medium : common;
      const mission = pool[Math.floor(Math.random() * pool.length)]();
      return {
        id: `${tier}-${state.missionSerial}`,
        tier,
        progress: 0,
        ...mission
      };
    }

    function rewardText(reward) {
      if (reward.kind === "bonus") return `+${money(state.bet * reward.value)}`;
      if (reward.kind === "percent") return `Total +${Math.round(reward.value * 100)}%`;
      return `Total x${reward.value}`;
    }

    function renderMissions() {
      if (!state.missions.length) resetAllMissions();
      els.missionGrid.innerHTML = "";
      for (const mission of state.missions) {
        const card = document.createElement("div");
        card.className = `mission-card ${mission.tier === "jackpot" ? "jackpot" : ""}`;
        const pct = Math.max(0, Math.min(100, (mission.progress / mission.target) * 100));
        card.innerHTML = `
          <div class="mission-name">${mission.tier === "jackpot" ? "Jackpot - " : ""}${mission.text}</div>
          <div class="mission-progress"><div class="mission-fill" style="--mission-fill:${pct}%"></div></div>
          <div class="mission-reward">${Math.min(mission.progress, mission.target)} / ${mission.target} · ${rewardText(mission.reward)}</div>
        `;
        els.missionGrid.appendChild(card);
      }
    }

    function collectClearStats(clearList, groups, chain) {
      const colors = Array.from({ length: candyTypes }, () => 0);
      let scoringCount = 0;
      let striped = 0;
      let wrapped = 0;
      let colorSpecial = 0;
      let colorCombo = 0;
      let specialCombo = 0;
      for (const pos of clearList) {
        const cell = state.board[pos.r][pos.c];
        if (!cell || cell.special === "free") continue;
        scoringCount += 1;
        colors[cell.type] += 1;
        if (cell.special === "striped-h" || cell.special === "striped-v") striped += 1;
        if (cell.special === "wrapped") wrapped += 1;
        if (cell.special === "color") colorSpecial += 1;
      }
      for (const group of groups) {
        if (group.comboSpecial && group.comboSpecial.startsWith("color-")) colorCombo += 1;
        if (group.comboSpecial && group.comboSpecial !== "color-normal") specialCombo += 1;
        if (group.comboSpecial && group.comboSpecial.includes("striped")) striped += 1;
        if (group.comboSpecial && group.comboSpecial.includes("wrapped")) wrapped += 1;
      }
      return { colors, scoringCount, striped, wrapped, colorSpecial, colorCombo, specialCombo, comboWaves: Math.max(0, chain - 1) };
    }

    function updateMissionProgress(stats) {
      if (state.freeMode) return [];
      if (!state.missions.length) resetAllMissions();
      const completed = [];
      for (const mission of state.missions) {
        let gain = 0;
        if (mission.type === "color") gain = stats.colors[mission.color] || 0;
        if (mission.type === "special" && mission.special === "striped") gain = stats.striped;
        if (mission.type === "special" && mission.special === "wrapped") gain = stats.wrapped;
        if (mission.type === "special" && mission.special === "color") gain = stats.colorSpecial;
        if (mission.type === "singleClear" && stats.scoringCount >= mission.target) gain = mission.target;
        if (mission.type === "combo") gain = stats.comboWaves;
        if (mission.type === "colorCombo") gain = stats.colorCombo;
        if (mission.type === "specialCombo") gain = stats.specialCombo;
        if (!gain) continue;
        mission.progress = Math.min(mission.target, mission.progress + gain);
        if (mission.progress >= mission.target) completed.push(mission);
      }
      const rewards = [];
      for (const mission of completed) {
        rewards.push(applyMissionReward(mission));
        const index = state.missions.findIndex(item => item.id === mission.id);
        if (index >= 0) state.missions[index] = createMission(mission.tier);
      }
      return rewards;
    }

    function applyMissionReward(mission) {
      const reward = mission.reward;
      let text = "";
      if (reward.kind === "bonus") {
        const amount = state.bet * reward.value;
        state.totalScore += amount;
        text = `${mission.tier === "jackpot" ? "Jackpot" : "\u4efb\u52d9"} +${money(amount)}`;
      } else if (reward.kind === "percent") {
        const amount = Math.max(state.totalScore, state.bet) * reward.value;
        state.totalScore += amount;
        text = `${mission.tier === "jackpot" ? "Jackpot" : "\u4efb\u52d9"} +${Math.round(reward.value * 100)}%`;
      } else {
        state.winMultiplier *= reward.value;
        text = `Jackpot x${reward.value}`;
      }
      playSound(mission.tier === "jackpot" ? "combo" : "claim");
      return text;
    }

    function showMissionPopups(clearList, rewards) {
      if (!rewards.length) return;
      const anchor = clearList[0] || { r: 3, c: 3 };
      rewards.forEach((text, index) => {
        state.popups.push({
          r: Math.max(0, anchor.r - 0.45 - index * 0.35),
          c: Math.min(size - 1, anchor.c + 0.45),
          text,
          kind: "combo"
        });
      });
      setToast(rewards.join(" / "));
    }

    function finalScore() {
      return Number((state.totalScore * state.winMultiplier).toFixed(1));
    }

    function sameMatchType(a, b) {
      return a && b &&
        a.special !== "color" && b.special !== "color" &&
        a.special !== "free" && b.special !== "free" &&
        a.type === b.type;
    }

    function colorSwapGroup(a, b) {
      const cellA = state.board[a.r][a.c];
      const cellB = state.board[b.r][b.c];
      const colorPos = cellA && cellA.special === "color" ? a : cellB && cellB.special === "color" ? b : null;
      const target = colorPos === a ? cellB : colorPos === b ? cellA : null;
      if (!colorPos || !target || target.special === "free") return null;

      if (target.special === "color") {
        const cells = [];
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) cells.push({ r, c });
        }
        return {
          cells,
          orientation: "special",
          type: target.type,
          comboSpecial: "color-color",
          forceMessage: "\u5f69\u8679\u7cd6\u4e92\u649e\uff1a\u5168\u76e4\u6e05\u9664\uff01"
        };
      }

      const cells = [colorPos];
      const targets = [];
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (state.board[r][c] && state.board[r][c].type === target.type && state.board[r][c].special !== "free") {
            const pos = { r, c };
            cells.push(pos);
            targets.push(pos);
          }
        }
      }

      const comboSpecial = target.special === "striped-h" || target.special === "striped-v"
        ? "color-striped"
        : target.special === "wrapped"
          ? "color-wrapped"
          : "color-normal";

      const messages = {
        "color-normal": "\u5f69\u8679\u7cd6\u6e05\u9664\u540c\u8272\u7cd6\uff01",
        "color-striped": "\u5f69\u8679\u7cd6\u9023\u52d5\uff1a\u540c\u8272\u7cd6\u5168\u90e8\u8b8a\u689d\u7d0b\uff01",
        "color-wrapped": "\u5f69\u8679\u7cd6\u9023\u52d5\uff1a\u540c\u8272\u7cd6\u5168\u90e8\u7206\u958b\uff01"
      };

      return {
        cells,
        targets,
        orientation: "special",
        type: target.type,
        comboSpecial,
        forceMessage: messages[comboSpecial]
      };
    }

    function updateUI() {
      const freeCount = countFreeCandies();
      els.app.classList.toggle("in-round", state.inRound);
      els.balance.textContent = money(state.balance);
      els.menuBalance.textContent = money(state.balance);
      els.bet.textContent = money(state.bet);
      els.menuBet.textContent = money(state.bet);
      els.score.textContent = formatScore(state.score);
      els.multiplier.textContent = `x${state.comboMultiplier.toFixed(2)}`;
      els.total.textContent = formatScore(finalScore());
      els.missionBonus.textContent = `Win x${state.winMultiplier.toFixed(2)}`;
      els.freeStatus.textContent = state.freeMoves > 0
        ? `Free \u6a21\u5f0f\uff1a${state.freeMoves} \u6b65`
        : `Free \u7cd6\u679c ${Math.min(freeCount, 3)}/3`;
      renderMissions();
      const canAfford = state.balance >= state.bet;
      els.claim.disabled = !state.inRound || state.freeMode || finalScore() <= 0 || state.busy;
      els.chooseBet.disabled = !state.inRound || state.busy || state.freeMode;
      els.startGame.disabled = state.inRound || state.busy || !canAfford;
      els.menuBetDown.disabled = state.inRound || state.busy || state.bet <= 5;
      els.menuBetUp.disabled = state.inRound || state.busy || state.bet >= 100 || state.bet + 5 > state.balance;
      els.betDown.disabled = true;
      els.betUp.disabled = true;
    }

    function saveBetState() {
      if (!state.board.length) return;
      state.betStates.set(state.bet, {
        board: cloneBoard(state.board),
        score: state.score,
        totalScore: state.totalScore,
        comboMultiplier: state.comboMultiplier,
        winMultiplier: state.winMultiplier,
        freeMoves: state.freeMoves,
        freeMode: state.freeMode,
        mainBoardSnapshot: state.mainBoardSnapshot ? cloneBoard(state.mainBoardSnapshot) : null
      });
    }

    function loadBetState(bet) {
      const saved = state.betStates.get(bet);
      state.selected = null;
      state.dragStart = null;
      state.hint = [];
      clearEffects();
      if (saved) {
        state.board = cloneBoard(saved.board);
        state.score = saved.score;
        state.totalScore = saved.totalScore;
        state.comboMultiplier = saved.comboMultiplier;
        state.winMultiplier = saved.winMultiplier || 1;
        state.freeMoves = saved.freeMoves || 0;
        state.freeMode = Boolean(saved.freeMode);
        state.mainBoardSnapshot = saved.mainBoardSnapshot ? cloneBoard(saved.mainBoardSnapshot) : null;
        document.body.classList.toggle("free-stage", state.freeMode);
      } else {
        state.score = 0;
        state.totalScore = 0;
        state.comboMultiplier = 1;
        state.winMultiplier = 1;
        state.freeMoves = 0;
        state.freeMode = false;
        state.mainBoardSnapshot = null;
        document.body.classList.remove("free-stage");
        createFreshBoard();
      }
      updateUI();
      render();
      resetIdleHint();
    }

    function createFreshBoard() {
      let guard = 0;
      do {
        state.board = Array.from({ length: size }, () =>
          Array.from({ length: size }, () => makeCell(randomCandy()))
        );
        removeStartingMatches();
        guard += 1;
      } while (!findValidMove() && guard < 80);
      if (!findValidMove()) seedPlayablePatternAnyBoard();
    }

    function ensurePlayableBoard() {
      return Boolean(findMatchGroups().length || findValidMove());
    }

    function spendBet() {
      if (!state.inRound) {
        playSound("invalid");
        setToast("\u8acb\u5148\u9078\u64c7 Bet \u958b\u59cb\u65b0\u5c40\u3002");
        return false;
      }
      if (state.freeMoves > 0) {
        state.freeMoves -= 1;
        state.freeMode = true;
        updateUI();
        setToast(state.freeMoves > 0 ? `Free \u79fb\u52d5\uff0c\u5269 ${state.freeMoves} \u6b65\u3002` : "Free \u79fb\u52d5\u7528\u5b8c\uff0c\u672c\u6b21\u7d50\u7b97\u5f8c\u8fd4\u56de\u539f\u76e4\u3002");
        return true;
      }
      if (state.balance < state.bet) {
        playSound("invalid");
        setToast("\u9918\u984d\u4e0d\u8db3\uff0c\u8acb\u6536\u4e0b\u6216\u91cd\u9078 Bet\u3002");
        return false;
      }
      state.balance -= state.bet;
      updateUI();
      return true;
    }

    function refillBoard() {
      const filled = [];
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (!state.board[r][c]) filled.push({ r, c });
        }
      }
      if (!filled.length) return filled;

      const snapshot = cloneBoard(state.board);
      for (let attempt = 0; attempt < 140; attempt += 1) {
        for (const pos of filled) state.board[pos.r][pos.c] = generateRefillCell(pos.r, pos.c);
        if (findMatchGroups().length || findValidMove()) return filled;
        for (const pos of filled) state.board[pos.r][pos.c] = null;
      }

      state.board = cloneBoard(snapshot);
      for (const pos of filled) state.board[pos.r][pos.c] = generateRefillCell(pos.r, pos.c, false);
      seedPlayablePatternInFilled(filled);
      return filled;
    }

    function generateRefillCell(r, c, allowFree = true) {
      if (allowFree && !state.freeMode && !state.suppressFreeSpawn && Math.random() < 0.03) return makeCell(randomCandy(), "free");
      const type = safeCandyType(r, c);
      if (state.freeMoves > 0) {
        const roll = Math.random();
        if (roll < 0.1) return makeCell(type, "wrapped");
        if (roll < 0.28) return makeCell(type, Math.random() < 0.5 ? "striped-h" : "striped-v");
      }
      return makeCell(type);
    }

    function seedPlayablePatternInFilled(filled) {
      const byRow = new Map();
      for (const pos of filled) {
        if (!byRow.has(pos.r)) byRow.set(pos.r, []);
        byRow.get(pos.r).push(pos.c);
      }
      for (const [r, cols] of byRow) {
        cols.sort((a, b) => a - b);
        for (let i = 0; i <= cols.length - 4; i += 1) {
          if (cols[i + 3] - cols[i] !== 3) continue;
          const type = safeCandyType(r, cols[i]);
          const decoy = (type + 1 + Math.floor(Math.random() * (candyTypes - 1))) % candyTypes;
          state.board[r][cols[i]] = makeCell(type);
          state.board[r][cols[i + 1]] = makeCell(type);
          state.board[r][cols[i + 2]] = makeCell(decoy);
          state.board[r][cols[i + 3]] = makeCell(type);
          return true;
        }
      }
      return false;
    }

    function seedPlayablePatternAnyBoard() {
      const row = Math.floor(Math.random() * size);
      const col = Math.floor(Math.random() * (size - 3));
      const type = randomCandy();
      const decoy = (type + 1 + Math.floor(Math.random() * (candyTypes - 1))) % candyTypes;
      state.board[row][col] = makeCell(type);
      state.board[row][col + 1] = makeCell(type);
      state.board[row][col + 2] = makeCell(decoy);
      state.board[row][col + 3] = makeCell(type);
    }

    function countFreeCandies() {
      let count = 0;
      if (!state.board.length) return count;
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (state.board[r][c] && state.board[r][c].special === "free") count += 1;
        }
      }
      return count;
    }

    function showFreeTransition(text) {
      els.freeTransition.textContent = text;
      els.freeTransition.classList.remove("show");
      void els.freeTransition.offsetWidth;
      els.freeTransition.classList.add("show");
    }

    function createFreeBoard() {
      let guard = 0;
      do {
        state.board = Array.from({ length: size }, () =>
          Array.from({ length: size }, () => generateFreeBoardCell())
        );
        removeStartingMatches();
        guard += 1;
      } while (!findValidMove() && guard < 80);
      if (!findValidMove()) seedPlayablePatternAnyBoard();
    }

    function generateFreeBoardCell() {
      const type = randomCandy();
      const roll = Math.random();
      if (roll < 0.14) return makeCell(type, "wrapped");
      if (roll < 0.38) return makeCell(type, Math.random() < 0.5 ? "striped-h" : "striped-v");
      return makeCell(type);
    }

    async function enterFreeStage() {
      state.mainBoardSnapshot = cloneBoard(state.board);
      showFreeTransition("FREE MODE");
      playSound("combo");
      await wait(620);
      state.freeMoves = 5;
      state.freeMode = true;
      document.body.classList.add("free-stage");
      stopMusic();
      startMusic();
      createFreeBoard();
      updateUI();
      render();
      setToast("Free \u6a21\u5f0f\u958b\u59cb\uff1a5 \u6b65\u4e0d\u6263 Bet\uff01");
      await wait(720);
    }

    async function exitFreeStage() {
      if (!state.freeMode || state.returningFromFree) return;
      state.returningFromFree = true;
      showFreeTransition("RETURN");
      playSound("claim");
      await wait(620);
      state.freeMode = false;
      state.freeMoves = 0;
      document.body.classList.remove("free-stage");
      if (state.mainBoardSnapshot) state.board = cloneBoard(state.mainBoardSnapshot);
      state.mainBoardSnapshot = null;
      stopMusic();
      startMusic();
      clearEffects();
      updateUI();
      render();
      setToast("Free \u7d50\u675f\uff0c\u56de\u5230\u539f\u672c\u76e4\u9762\u3002");
      await wait(500);
      state.returningFromFree = false;
    }

    function createMission(tier) {
      state.missionSerial += 1;
      const color = Math.floor(Math.random() * candyTypes);
      const common = [
        () => ({
          type: "color",
          color,
          target: 10,
          reward: { kind: "bonus", value: 0.5 },
          text: `\u6d88\u53bb 10 \u9846${candyNames[color]}\u7cd6`
        }),
        () => ({
          type: "special",
          special: "striped",
          target: 2,
          reward: { kind: "bonus", value: 0.8 },
          text: "\u89f8\u767c 2 \u6b21\u689d\u7d0b\u7cd6"
        }),
        () => ({
          type: "special",
          special: "color",
          target: 1,
          reward: { kind: "percent", value: 0.1 },
          text: "\u89f8\u767c 1 \u6b21\u5f69\u8679\u7cd6"
        })
      ];
      const medium = [
        () => ({
          type: "color",
          color,
          target: 24,
          reward: { kind: "bonus", value: 2 },
          text: `\u6d88\u53bb 24 \u9846${candyNames[color]}\u7cd6`
        }),
        () => ({
          type: "special",
          special: "wrapped",
          target: 2,
          reward: { kind: "percent", value: 0.18 },
          text: "\u89f8\u767c 2 \u6b21\u5305\u88dd\u7cd6"
        }),
        () => ({
          type: "combo",
          target: 3,
          reward: { kind: "percent", value: 0.2 },
          text: "\u9054\u6210 3 \u6ce2 Combo"
        })
      ];
      const jackpot = [
        () => ({
          type: "specialCombo",
          target: 2,
          reward: { kind: "multiplier", value: 2 },
          text: "\u89f8\u767c 2 \u6b21\u7279\u6b8a\u7cd6\u9023\u52d5"
        }),
        () => ({
          type: "colorCombo",
          target: 1,
          reward: { kind: "multiplier", value: 2.5 },
          text: "\u89f8\u767c\u5f69\u8679\u7cd6\u9023\u52d5"
        }),
        () => ({
          type: "special",
          special: "wrapped",
          target: 4,
          reward: { kind: "multiplier", value: 3 },
          text: "\u89f8\u767c 4 \u6b21\u5305\u88dd\u7cd6"
        })
      ];
      const pool = tier === "jackpot" ? jackpot : tier === "medium" ? medium : common;
      const mission = pool[Math.floor(Math.random() * pool.length)]();
      return {
        id: `${tier}-${state.missionSerial}`,
        tier,
        progress: 0,
        ...mission
      };
    }

    async function triggerFreeCandyModeIfReady() {
      if (state.freeCollecting || countFreeCandies() < 3) return false;
      state.freeCollecting = true;
      const freePositions = [];
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (state.board[r][c] && state.board[r][c].special === "free") freePositions.push({ r, c });
        }
      }
      state.effects = new Map(freePositions.map(pos => [keyOf(pos), "free-collect"]));
      render();
      playSound("combo");
      setToast("Free \u7cd6\u679c\u96c6\u6eff\uff0c\u5373\u5c07\u9032\u5165 Free \u6a21\u5f0f\uff01");
      await wait(820);
      for (const pos of freePositions) state.board[pos.r][pos.c] = null;
      state.effects.clear();
      const moved = collapseBoard();
      state.suppressFreeSpawn = true;
      const filled = refillBoard();
      state.suppressFreeSpawn = false;
      state.settling = new Set(moved.map(keyOf));
      state.entering = new Set(filled.map(keyOf));
      updateUI();
      render();
      await wait(300);
      state.settling.clear();
      state.entering.clear();
      await enterFreeStage();
      state.freeCollecting = false;
      updateUI();
      render();
      return true;
    }

    async function resolveMatches(initialGroups, swapPair = []) {
      try {
        let groups = initialGroups;
        let chain = 0;
        const maxChains = 30;

        while (groups.length && chain < maxChains) {
          chain += 1;
          const specialPlans = chooseCreatedSpecials(groups, swapPair);
          const clearSet = expandClearSet(flattenGroups(groups), specialPlans, groups);
          for (const key of Array.from(clearSet)) {
            const pos = parseKey(key);
            const cell = state.board[pos.r][pos.c];
            if (cell && cell.special === "free") clearSet.delete(key);
          }
          const clearList = Array.from(clearSet, parseKey);
          const scoringList = clearList.filter(pos => {
            const cell = state.board[pos.r][pos.c];
            return cell && cell.special !== "free";
          });
          const visuals = collectSpecialVisuals(clearSet, specialPlans, groups);
          const chargeVisuals = collectColorChargeVisuals(groups);
          const stats = collectClearStats(clearList, groups, chain);

          const baseGain = scoringList.length * perCandyPayout();
          const comboGain = chain > 1 ? 0.1 * (chain - 1) : 0;
          state.score += baseGain;
          state.comboMultiplier += comboGain;
          state.totalScore += baseGain * state.comboMultiplier;
          const missionRewards = state.freeMode ? [] : updateMissionProgress(stats);
          updateUI();
          showScorePopups(scoringList.length ? scoringList : clearList, baseGain, comboGain, null);
          showMissionPopups(scoringList.length ? scoringList : clearList, missionRewards);

          if (chargeVisuals.size) {
            state.effects = chargeVisuals;
            render();
            setToast("\u5f69\u8679\u7cd6\u6b63\u5728\u84c4\u529b...");
            playSound("special");
            await wait(760);
            state.effects.clear();
          }

          if (visuals.size) {
            state.effects = visuals;
            render();
            setToast(describeSpecialVisuals(visuals));
            playSound("special");
            await wait(640);
            state.effects.clear();
          }

          state.clearing = clearSet;
          render();
          setToast(chain === 1 ? describeSpecialPlan(specialPlans, groups) : `Combo ${chain - 1}\uff01`);
          playSound(chain === 1 ? "clear" : "combo");
          await wait(360);
          state.popups = [];

          for (const pos of clearList) state.board[pos.r][pos.c] = null;
          for (const specialPlan of specialPlans) {
            state.board[specialPlan.pos.r][specialPlan.pos.c] = makeCell(specialPlan.type, specialPlan.special);
          }
          state.clearing.clear();

          const moved = collapseBoard();
          const filled = refillBoard();
          state.settling = new Set(moved.map(keyOf));
          state.entering = new Set(filled.map(keyOf));
          updateUI();
          render();
          setToast("\u7cd6\u679c\u88dc\u4e0a\u4f86\u4e86\uff01");
          await wait(330);

          state.settling.clear();
          state.entering.clear();
          render();
          await wait(80);
          groups = findMatchGroups();
          swapPair = [];
        }

        if (chain >= maxChains && findMatchGroups().length) setToast("Combo \u592a\u9577\uff0c\u5148\u5e6b\u4f60\u505c\u5728\u7a69\u5b9a\u72c0\u614b\u3002");
        if (state.freeMode && state.freeMoves <= 0) {
          await exitFreeStage();
        } else {
          const triggeredFree = await triggerFreeCandyModeIfReady();
          if (triggeredFree) {
          const followUpGroups = findMatchGroups();
          if (followUpGroups.length) await resolveMatches(followUpGroups, []);
          }
        }
      } catch (error) {
        console.error(error);
        setToast("\u76e4\u9762\u7d50\u7b97\u6642\u51fa\u73fe\u554f\u984c\u3002");
      } finally {
        state.busy = false;
        state.selected = null;
        state.hint = [];
        clearEffects();
        ensurePlayableBoard();
        saveBetState();
        updateUI();
        render();
        resetIdleHint();
      }
    }

    function startRound() {
      if (state.busy || state.inRound) return;
      if (state.balance < state.bet) {
        playSound("invalid");
        setToast("\u9918\u984d\u4e0d\u8db3\uff0c\u8acb\u8abf\u4f4e Bet\u3002");
        updateUI();
        return;
      }
      state.inRound = true;
      loadBetState(state.bet);
      playSound("select");
      setToast(`Bet ${money(state.bet)} \u5df2\u9396\u5b9a\uff0c\u958b\u59cb\u672c\u5c40\u3002`);
    }

    function returnToBetScreen() {
      saveBetState();
      state.inRound = false;
      state.selected = null;
      state.dragStart = null;
      state.hint = [];
      clearEffects();
      clearIdleHint();
      updateUI();
    }

    function chooseBetScreen() {
      if (!state.inRound || state.busy) {
        playSound("invalid");
        return;
      }
      returnToBetScreen();
      playSound("select");
      setToast("\u5df2\u4fdd\u7559\u76ee\u524d\u76e4\u9762\uff0c\u8acb\u9078\u64c7 Bet\u3002");
    }

    function claim() {
      if (state.freeMode) {
        playSound("invalid");
        setToast("Free \u6a21\u5f0f\u4e2d\u4e0d\u80fd\u6536\u4e0b\u7cd6\u5e63\uff0c\u7d50\u675f\u5f8c\u6703\u56de\u5230\u4e3b\u76e4\u9762\u3002");
        return;
      }
      if (!state.inRound || finalScore() <= 0 || state.busy) {
        playSound("invalid");
        setToast("\u9084\u6c92\u6709\u53ef\u4ee5\u6536\u4e0b\u7684\u7cd6\u5e63\u3002");
        return;
      }
      const win = finalScore();
      state.balance += win;
      state.score = 0;
      state.totalScore = 0;
      state.comboMultiplier = 1;
      state.winMultiplier = 1;
      state.freeMoves = 0;
      state.freeMode = false;
      if (state.mainBoardSnapshot) state.board = cloneBoard(state.mainBoardSnapshot);
      state.mainBoardSnapshot = null;
      document.body.classList.remove("free-stage");
      stopMusic();
      startMusic();
      resetAllMissions();
      saveBetState();
      updateUI();
      playSound("claim");
      setToast(`\u6536\u4e0b ${money(win)} \u7cd6\u5e63\uff0c\u4efb\u52d9\u5df2\u5237\u65b0\uff0c\u76e4\u9762\u5df2\u4fdd\u7559\u3002`);
      resetIdleHint();
    }

    function changeBet(delta) {
      if (state.inRound || state.busy) {
        playSound("invalid");
        setToast("\u672c\u5c40 Bet \u5df2\u9396\u5b9a\uff0c\u6536\u4e0b\u7cd6\u5e63\u5f8c\u624d\u80fd\u91cd\u65b0\u9078\u64c7\u3002");
        return;
      }
      const previousBet = state.bet;
      state.bet = Math.max(5, Math.min(100, state.bet + delta));
      if (state.bet > state.balance && state.balance >= 5) state.bet = Math.floor(state.balance / 5) * 5;
      if (state.balance < 5) state.bet = 5;
      updateUI();
      if (state.bet !== previousBet) playSound("select");
    }

    function setToast(text) {
      els.toast.textContent = text;
    }

    function inBounds(r, c) {
      return r >= 0 && c >= 0 && r < size && c < size;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function startAudio() {
      if (state.audio) {
        if (state.audio.state === "suspended") state.audio.resume();
        return state.audio;
      }

      const AudioContextClass = globalThis.AudioContext || globalThis.webkitAudioContext;
      if (!AudioContextClass) return null;
      state.audio = new AudioContextClass();
      startMusic();
      return state.audio;
    }

    function playSound(kind) {
      const audio = startAudio();
      if (!audio) return;

      const now = audio.currentTime;
      if (kind === "select") {
        tone(740, 0.055, 0.045, "triangle", now);
      } else if (kind === "invalid") {
        tone(180, 0.09, 0.05, "sawtooth", now);
      } else if (kind === "clear") {
        tone(520, 0.07, 0.06, "sine", now);
        tone(780, 0.08, 0.045, "triangle", now + 0.045);
      } else if (kind === "combo") {
        tone(660, 0.075, 0.075, "triangle", now);
        tone(880, 0.085, 0.072, "triangle", now + 0.05);
        tone(1175, 0.095, 0.066, "triangle", now + 0.1);
        tone(1760, 0.13, 0.045, "sine", now + 0.16);
        tone(2349, 0.08, 0.028, "sine", now + 0.22);
      } else if (kind === "special") {
        tone(392, 0.12, 0.045, "sine", now);
        tone(784, 0.16, 0.05, "triangle", now + 0.04);
        tone(1568, 0.18, 0.035, "sine", now + 0.09);
      } else if (kind === "claim") {
        tone(523, 0.08, 0.055, "triangle", now);
        tone(659, 0.08, 0.055, "triangle", now + 0.07);
        tone(784, 0.12, 0.06, "triangle", now + 0.14);
      }
    }

    function tone(freq, duration, volume, type, startTime) {
      const audio = state.audio;
      if (!audio) return;

      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);
      const attack = Math.min(0.03, duration * 0.32);
      const releaseStart = Math.max(startTime + attack + 0.01, startTime + duration - 0.045);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + attack);
      gain.gain.setValueAtTime(volume, releaseStart);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.connect(gain);
      gain.connect(audio.destination);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.025);
    }

    function chord(freqs, duration, volume, type, startTime) {
      for (const freq of freqs) tone(freq, duration, volume / freqs.length, type, startTime);
    }

    function stopMusic() {
      if (state.musicTimer) clearInterval(state.musicTimer);
      state.musicTimer = null;
    }

    function sugarTick(startTime, volume = 0.018) {
      return;
    }

    function softPad(freqs, startTime, duration = 1.35) {
      for (const freq of freqs) {
        tone(freq, duration, 0.018, "sine", startTime);
        tone(freq * 2.01, duration * 0.82, 0.006, "triangle", startTime + 0.04);
      }
    }

    function startMusic() {
      if (state.musicTimer || !state.audio) return;
      if (state.freeMode) {
        startFreeMusic();
        return;
      }
      const chords = [
        [262, 330, 392, 523],
        [220, 277, 330, 440],
        [294, 370, 440, 587],
        [196, 247, 294, 392]
      ];
      const bass = [131, 110, 147, 98];
      const lead = [
        659, 0, 784, 880, 0, 784, 659, 523,
        587, 0, 659, 784, 0, 880, 784, 659,
        698, 0, 880, 988, 0, 880, 784, 587,
        659, 0, 784, 659, 0, 587, 523, 0
      ];
      const arp = [
        523, 659, 784, 1047,
        440, 554, 659, 880,
        587, 740, 880, 1175,
        392, 494, 587, 784
      ];
      let bar = 0;
      const playMusicBar = () => {
        if (!state.audio || state.audio.state === "suspended") return;
        const now = state.audio.currentTime + 0.035;
        const chordIndex = bar % chords.length;
        softPad(chords[chordIndex], now, 1.55);
        tone(bass[chordIndex], 1.2, 0.026, "triangle", now + 0.02);

        for (let i = 0; i < 8; i += 1) {
          const t = now + i * 0.18;
          const arpNote = arp[(bar * 4 + i) % arp.length];
          if (i % 2 === 0) tone(arpNote, 0.105, 0.016, "triangle", t);
          if (i === 1 || i === 5) sugarTick(t + 0.05, 0.013);

          const leadNote = lead[(bar * 8 + i) % lead.length];
          if (leadNote && (i === 2 || i === 3 || i === 6)) {
            tone(leadNote, 0.22, 0.032, "sine", t + 0.025);
            tone(leadNote * 2, 0.07, 0.008, "triangle", t + 0.045);
          }
        }
        bar += 1;
      };
      playMusicBar();
      state.musicTimer = setInterval(playMusicBar, 1440);
    }

    function startFreeMusic() {
      if (state.musicTimer || !state.audio) return;
      const pads = [
        [196, 247, 294, 392],
        [220, 277, 330, 440],
        [262, 330, 392, 523],
        [247, 311, 370, 494]
      ];
      const sparkle = [784, 988, 1175, 1568, 1397, 1175, 988, 880];
      let step = 0;
      const playFreeBar = () => {
        if (!state.audio || state.audio.state === "suspended") return;
        const now = state.audio.currentTime + 0.03;
        const pad = pads[step % pads.length];
        softPad(pad, now, 1.75);
        tone(pad[0] / 2, 1.3, 0.022, "sine", now + 0.02);
        for (let i = 0; i < 8; i += 1) {
          const t = now + i * 0.16;
          const note = sparkle[(step * 3 + i) % sparkle.length];
          if (i % 2 === 0) tone(note, 0.11, 0.024, "triangle", t);
          if (i === 3 || i === 7) {
            tone(note * 1.5, 0.08, 0.012, "sine", t + 0.045);
            sugarTick(t + 0.03, 0.018);
          }
        }
        step += 1;
      };
      playFreeBar();
      state.musicTimer = setInterval(playFreeBar, 1280);
    }

    els.claim.addEventListener("click", claim);
    els.chooseBet.addEventListener("click", chooseBetScreen);
    els.betDown.addEventListener("click", () => changeBet(-5));
    els.betUp.addEventListener("click", () => changeBet(5));
    els.menuBetDown.addEventListener("click", () => changeBet(-5));
    els.menuBetUp.addEventListener("click", () => changeBet(5));
    els.startGame.addEventListener("click", startRound);
    els.hint.addEventListener("click", showHint);
    updateUI();
    setToast("\u8acb\u5148\u9078\u64c7 Bet \u958b\u59cb\u65b0\u5c40\u3002");
  </script>
</body>
</html>
