<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Sugar Pop Click Demo</title>
  <style>
    :root {
      --ink: #5a2d61;
      --panel: rgba(255, 255, 255, 0.78);
      --cell: clamp(38px, 12.2vw, 66px);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 216, 77, 0.78) 0 18px, transparent 19px),
        radial-gradient(circle at 86% 16%, rgba(63, 205, 255, 0.72) 0 24px, transparent 25px),
        radial-gradient(circle at 82% 84%, rgba(255, 70, 153, 0.66) 0 24px, transparent 25px),
        linear-gradient(160deg, #fff0a8 0%, #ffb7d8 45%, #a8ecff 100%);
      user-select: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.34) 0 9px, transparent 9px 26px),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.56), transparent 48%);
      opacity: 0.56;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100vw, 560px);
      height: 100dvh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: grid;
      gap: 0;
      line-height: 1;
    }

    .brand-title {
      font-size: clamp(24px, 8vw, 40px);
      font-weight: 1000;
      color: #ff337f;
      text-shadow: 0 3px 0 #fff, 0 6px 14px rgba(117, 24, 87, 0.18);
      letter-spacing: 0;
    }

    .brand-sub {
      margin-top: 2px;
      font-size: 12px;
      font-weight: 900;
      color: rgba(90, 45, 97, 0.72);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      min-width: 86px;
      padding: 8px 10px;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(150, 58, 113, 0.12), inset 0 1px 0 rgba(255,255,255,0.82);
    }

    .label {
      font-size: 11px;
      font-weight: 900;
      color: rgba(90, 45, 97, 0.68);
      text-transform: uppercase;
    }

    .value {
      margin-top: 2px;
      font-size: 22px;
      line-height: 1;
      font-weight: 1000;
      color: #7b2c91;
    }

    .board-zone {
      min-height: 0;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
    }

    .board {
      position: relative;
      width: calc(var(--cell) * 7 + 18px);
      height: calc(var(--cell) * 7 + 18px);
      padding: 9px;
      display: grid;
      grid-template-columns: repeat(7, var(--cell));
      grid-template-rows: repeat(7, var(--cell));
      border-radius: 12px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.82), rgba(255,255,255,0.34)),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.16) 0 8px, transparent 8px 20px);
      border: 2px solid rgba(255,255,255,0.86);
      box-shadow: 0 18px 34px rgba(113, 38, 99, 0.22), inset 0 2px 0 rgba(255,255,255,0.85);
      touch-action: manipulation;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border: 0;
      padding: 5px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.26);
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 160ms ease, background 160ms ease;
    }

    .cell:active { transform: scale(0.94); }
    .cell.invalid { animation: shake 260ms ease; }
    .cell.clearing .candy { animation: candy-clear 330ms ease forwards; }
    .cell.entering .candy { animation: candy-enter 360ms cubic-bezier(.2, .95, .24, 1.05); }
    .cell.settling .candy { animation: candy-settle 280ms cubic-bezier(.2, .95, .24, 1.05); }
    .cell.hint { background: rgba(255,255,255,0.48); }
    .cell.hint .candy { animation: hint-hop 760ms ease-in-out infinite; }

    .candy {
      position: relative;
      width: 88%;
      height: 88%;
      border-radius: 50%;
      filter: drop-shadow(0 7px 8px rgba(89, 31, 93, 0.22));
      transform-origin: center;
      overflow: hidden;
    }

    .candy::before {
      content: "";
      position: absolute;
      inset: 9% 12% 45% 18%;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255,255,255,0.1));
      transform: rotate(-18deg);
      mix-blend-mode: screen;
    }

    .candy::after {
      content: "";
      position: absolute;
      inset: 15%;
      border-radius: inherit;
      background:
        radial-gradient(circle at 38% 32%, rgba(255,255,255,0.9) 0 8%, transparent 9%),
        radial-gradient(circle at 68% 78%, rgba(0,0,0,0.14) 0 20%, transparent 21%);
      opacity: 0.72;
    }

    .type-0 {
      border-radius: 50% 46% 52% 48%;
      background: radial-gradient(circle at 32% 24%, #ff94b4 0 12%, #ff3f79 34%, #c90f4d 100%);
    }

    .type-1 {
      border-radius: 42% 58% 45% 55%;
      background: radial-gradient(circle at 34% 24%, #ffe282 0 13%, #ffb82e 38%, #e06b00 100%);
    }

    .type-2 {
      border-radius: 52% 48% 42% 58%;
      background: radial-gradient(circle at 32% 24%, #98f7ff 0 12%, #1cc5f3 38%, #0876bd 100%);
    }

    .type-3 {
      border-radius: 46% 54% 56% 44%;
      background: radial-gradient(circle at 34% 24%, #c1ff93 0 12%, #52d947 38%, #159844 100%);
    }

    .type-4 {
      border-radius: 55% 45% 52% 48%;
      background: radial-gradient(circle at 32% 24%, #d9b2ff 0 13%, #9a5cff 38%, #5a20c9 100%);
    }

    .type-5 {
      border-radius: 48% 52% 58% 42%;
      background: radial-gradient(circle at 34% 24%, #fff178 0 12%, #ffd22e 37%, #d69700 100%);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .toast {
      min-height: 38px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      border-radius: 8px;
      color: rgba(90, 45, 97, 0.86);
      font-size: 13px;
      font-weight: 900;
      background: rgba(255,255,255,0.58);
      border: 2px solid rgba(255,255,255,0.58);
      box-shadow: 0 10px 22px rgba(113, 38, 99, 0.1);
    }

    .hint-btn {
      height: 38px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-weight: 1000;
      background: linear-gradient(135deg, #ff4b93, #7d42ff);
      box-shadow: 0 10px 20px rgba(119, 39, 144, 0.24), inset 0 1px 0 rgba(255,255,255,0.42);
      cursor: pointer;
      touch-action: manipulation;
    }

    .score-pop {
      position: absolute;
      left: calc(9px + var(--c) * var(--cell) + var(--cell) * 0.34);
      top: calc(9px + var(--r) * var(--cell) + var(--cell) * 0.18);
      z-index: 4;
      min-width: 58px;
      padding: 5px 7px;
      border-radius: 8px;
      color: #fff;
      font-weight: 1000;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      background: linear-gradient(135deg, #ff3c82, #ffb82e);
      text-shadow: 0 1px 0 rgba(70, 20, 82, 0.4);
      box-shadow: 0 8px 18px rgba(126, 42, 99, 0.28);
      animation: score-pop 860ms ease both;
    }

    .score-pop.combo { background: linear-gradient(135deg, #7d42ff, #1cc5f3); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    @keyframes candy-clear {
      0% { opacity: 1; transform: scale(1); filter: brightness(1.1) drop-shadow(0 7px 8px rgba(89, 31, 93, 0.22)); }
      55% { opacity: 1; transform: scale(1.18) rotate(8deg); filter: brightness(1.35) drop-shadow(0 0 18px rgba(255,255,255,0.9)); }
      100% { opacity: 0; transform: scale(0.22) rotate(-14deg); }
    }

    @keyframes candy-enter {
      0% { opacity: 0; transform: translateY(calc(var(--cell) * -1.2)) scale(0.82); }
      74% { opacity: 1; transform: translateY(4px) scale(1.04); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes candy-settle {
      0% { transform: translateY(calc(var(--cell) * -0.6)) scale(0.96); }
      70% { transform: translateY(3px) scale(1.03); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes hint-hop {
      0%, 100% { transform: translateY(0) scale(1); }
      42% { transform: translateY(-7px) scale(1.04); }
    }

    @keyframes score-pop {
      0% { opacity: 0; transform: translateY(10px) scale(0.76); }
      18% { opacity: 1; transform: translateY(-4px) scale(1.08); }
      100% { opacity: 0; transform: translateY(-34px) scale(0.94); }
    }

    @media (max-height: 760px) {
      :root { --cell: clamp(34px, 11.5vw, 56px); }
      .app { gap: 6px; padding-top: max(7px, env(safe-area-inset-top)); padding-bottom: max(7px, env(safe-area-inset-bottom)); }
      .brand-title { font-size: clamp(22px, 7vw, 34px); }
      .brand-sub { display: none; }
      .stat { padding: 7px 9px; }
      .value { font-size: 20px; }
    }

    @media (max-width: 390px) {
      :root { --cell: clamp(34px, 11.5vw, 54px); }
      .toast { font-size: 12px; }
      .hint-btn { padding: 0 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">Sugar Pop</div>
        <div class="brand-sub">點擊 3 顆以上相連糖果</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">Combo</div>
          <div class="value" id="combo">x1.0</div>
        </div>
      </div>
    </header>

    <section class="board-zone">
      <div class="board" id="board" aria-label="candy board"></div>
    </section>

    <section class="controls">
      <div class="toast" id="toast">點擊 3 顆以上相連的同色糖果。</div>
      <button class="hint-btn" id="hint" type="button">提示</button>
    </section>
  </main>

  <script>
    const size = 7;
    const candyTypes = 6;
    const minGroup = 3;
    const comboWindow = 2000;

    const state = {
      board: [],
      score: 0,
      combo: 0,
      lastClearAt: 0,
      busy: false,
      hint: [],
      clearing: new Set(),
      entering: new Set(),
      settling: new Set(),
      invalid: new Set(),
      popups: [],
      hintTimer: null,
      audio: null,
      musicTimer: null
    };

    const els = {
      board: document.querySelector("#board"),
      score: document.querySelector("#score"),
      combo: document.querySelector("#combo"),
      toast: document.querySelector("#toast"),
      hint: document.querySelector("#hint")
    };

    function keyOf(pos) {
      return `${pos.r},${pos.c}`;
    }

    function parseKey(key) {
      const [r, c] = key.split(",").map(Number);
      return { r, c };
    }

    function inBounds(r, c) {
      return r >= 0 && r < size && c >= 0 && c < size;
    }

    function randomCandy() {
      return Math.floor(Math.random() * candyTypes);
    }

    function makeCell(type = randomCandy()) {
      return { type };
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function formatScore(value) {
      return Math.round(value).toLocaleString("en-US");
    }

    function setToast(text) {
      els.toast.textContent = text;
    }

    function updateUI() {
      els.score.textContent = formatScore(state.score);
      els.combo.textContent = `x${comboMultiplier().toFixed(1)}`;
    }

    function render() {
      els.board.innerHTML = "";
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          const cell = state.board[r][c];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "cell";
          button.dataset.r = r;
          button.dataset.c = c;
          button.setAttribute("aria-label", `candy ${r + 1}-${c + 1}`);
          const key = keyOf({ r, c });
          if (state.clearing.has(key)) button.classList.add("clearing");
          if (state.entering.has(key)) button.classList.add("entering");
          if (state.settling.has(key)) button.classList.add("settling");
          if (state.invalid.has(key)) button.classList.add("invalid");
          if (state.hint.some(pos => pos.r === r && pos.c === c)) button.classList.add("hint");
          if (cell) {
            const candy = document.createElement("div");
            candy.className = `candy type-${cell.type}`;
            button.appendChild(candy);
          }
          els.board.appendChild(button);
        }
      }

      for (const popup of state.popups) {
        const badge = document.createElement("div");
        badge.className = `score-pop ${popup.combo ? "combo" : ""}`;
        badge.style.setProperty("--r", popup.r);
        badge.style.setProperty("--c", popup.c);
        badge.textContent = popup.text;
        els.board.appendChild(badge);
      }
    }

    function createBoard() {
      do {
        state.board = Array.from({ length: size }, () =>
          Array.from({ length: size }, () => makeCell())
        );
      } while (!findClickableGroups().length);
    }

    function getConnectedGroup(start) {
      const startCell = state.board[start.r][start.c];
      if (!startCell) return [];
      const target = startCell.type;
      const seen = new Set([keyOf(start)]);
      const queue = [start];
      const group = [];
      while (queue.length) {
        const pos = queue.shift();
        group.push(pos);
        for (const next of [
          { r: pos.r - 1, c: pos.c },
          { r: pos.r + 1, c: pos.c },
          { r: pos.r, c: pos.c - 1 },
          { r: pos.r, c: pos.c + 1 }
        ]) {
          if (!inBounds(next.r, next.c)) continue;
          const key = keyOf(next);
          const cell = state.board[next.r][next.c];
          if (seen.has(key) || !cell || cell.type !== target) continue;
          seen.add(key);
          queue.push(next);
        }
      }
      return group;
    }

    function findClickableGroups() {
      const groups = [];
      const visited = new Set();
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          const key = keyOf({ r, c });
          if (visited.has(key) || !state.board[r][c]) continue;
          const group = getConnectedGroup({ r, c });
          for (const pos of group) visited.add(keyOf(pos));
          if (group.length >= minGroup) groups.push(group);
        }
      }
      groups.sort((a, b) => b.length - a.length);
      return groups;
    }

    function clearIdleHint() {
      if (state.hintTimer) clearTimeout(state.hintTimer);
      state.hintTimer = null;
      state.hint = [];
    }

    function resetIdleHint() {
      clearIdleHint();
      state.hintTimer = setTimeout(() => {
        if (state.busy) return;
        showHint();
      }, 5200);
    }

    function showHint() {
      const groups = findClickableGroups();
      if (!groups.length) {
        setToast("目前沒有可消群組，下一次補牌會修正。");
        return;
      }
      state.hint = groups[0];
      setToast(`提示：這一團有 ${groups[0].length} 顆可以消。`);
      render();
      resetIdleHint();
    }

    function comboMultiplier() {
      if (!state.combo) return 1;
      return 1 + (state.combo * (state.combo + 1) * 0.05);
    }

    function scoreFor(count) {
      return count * 10 + Math.max(0, count - 3) * 8;
    }

    function groupAnchor(group, clicked) {
      if (clicked) return clicked;
      const total = group.reduce((sum, pos) => ({ r: sum.r + pos.r, c: sum.c + pos.c }), { r: 0, c: 0 });
      return {
        r: Math.round(total.r / group.length),
        c: Math.round(total.c / group.length)
      };
    }

    function collapseBoard() {
      const moved = [];
      for (let c = 0; c < size; c += 1) {
        const stack = [];
        for (let r = size - 1; r >= 0; r -= 1) {
          if (state.board[r][c]) stack.push(state.board[r][c]);
        }
        for (let r = size - 1; r >= 0; r -= 1) {
          const next = stack[size - 1 - r] || null;
          if (state.board[r][c] !== next && next) moved.push({ r, c });
          state.board[r][c] = next;
        }
      }
      return moved;
    }

    function refillBoard() {
      let filled = [];
      const snapshot = state.board.map(row => row.slice());
      for (let attempt = 0; attempt < 80; attempt += 1) {
        state.board = snapshot.map(row => row.slice());
        filled = [];
        for (let r = 0; r < size; r += 1) {
          for (let c = 0; c < size; c += 1) {
            if (!state.board[r][c]) {
              state.board[r][c] = makeCell();
              filled.push({ r, c });
            }
          }
        }
        if (findClickableGroups().length) return filled;
      }

      if (forcePlayableWithNewCells(filled)) return filled;
      return filled;
    }

    function forcePlayableWithNewCells(filled) {
      const filledKeys = new Set(filled.map(keyOf));
      for (const pos of filled) {
        const original = state.board[pos.r][pos.c];
        for (let type = 0; type < candyTypes; type += 1) {
          state.board[pos.r][pos.c] = makeCell(type);
          if (findClickableGroups().length) return true;
        }
        state.board[pos.r][pos.c] = original;
      }

      for (const pos of filled) {
        const shapes = [
          [pos, { r: pos.r, c: pos.c + 1 }, { r: pos.r, c: pos.c + 2 }],
          [pos, { r: pos.r + 1, c: pos.c }, { r: pos.r + 2, c: pos.c }]
        ];
        for (const shape of shapes) {
          if (!shape.every(p => inBounds(p.r, p.c) && filledKeys.has(keyOf(p)))) continue;
          const type = randomCandy();
          for (const p of shape) state.board[p.r][p.c] = makeCell(type);
          return true;
        }
      }
      return false;
    }

    function showScorePopup(anchor, gain, combo) {
      state.popups.push({
        r: Math.max(0, anchor.r - 0.2),
        c: Math.min(size - 1, anchor.c + 0.15),
        text: combo > 0 ? `+${gain}  x${comboMultiplier().toFixed(1)}` : `+${gain}`,
        combo: combo > 0
      });
    }

    async function clearGroup(group, clicked) {
      state.busy = true;
      clearIdleHint();
      const now = Date.now();
      state.combo = now - state.lastClearAt <= comboWindow ? state.combo + 1 : 0;
      state.lastClearAt = now;

      const anchor = groupAnchor(group, clicked);
      const base = scoreFor(group.length);
      const gain = Math.round(base * comboMultiplier());
      state.score += gain;
      state.clearing = new Set(group.map(keyOf));
      showScorePopup(anchor, gain, state.combo);
      updateUI();
      render();
      setToast(state.combo ? `Combo ${state.combo}！消去 ${group.length} 顆糖果。` : `消去 ${group.length} 顆糖果！`);
      playSound(state.combo ? "combo" : "clear");
      await wait(340);

      for (const pos of group) state.board[pos.r][pos.c] = null;
      state.clearing.clear();
      state.popups = [];

      const moved = collapseBoard();
      const filled = refillBoard();
      state.settling = new Set(moved.map(keyOf));
      state.entering = new Set(filled.map(keyOf));
      render();
      await wait(360);

      state.settling.clear();
      state.entering.clear();
      state.hint = [];
      state.busy = false;
      updateUI();
      render();
      resetIdleHint();
    }

    async function handleClick(pos) {
      if (state.busy) return;
      startAudio();
      const group = getConnectedGroup(pos);
      if (group.length < minGroup) {
        state.invalid = new Set(group.map(keyOf));
        state.hint = [];
        render();
        setToast("要 3 顆以上相連才可以消去。");
        playSound("invalid");
        await wait(280);
        state.invalid.clear();
        render();
        resetIdleHint();
        return;
      }
      await clearGroup(group, pos);
    }

    els.board.addEventListener("click", event => {
      const cell = event.target.closest(".cell");
      if (!cell || !els.board.contains(cell)) return;
      handleClick({ r: Number(cell.dataset.r), c: Number(cell.dataset.c) });
    });

    els.hint.addEventListener("click", () => {
      startAudio();
      showHint();
    });

    function startAudio() {
      if (state.audio) {
        if (state.audio.state === "suspended") state.audio.resume();
        return state.audio;
      }
      const AudioContextClass = globalThis.AudioContext || globalThis.webkitAudioContext;
      if (!AudioContextClass) return null;
      state.audio = new AudioContextClass();
      startMusic();
      return state.audio;
    }

    function tone(freq, duration, volume, type, startTime) {
      const audio = state.audio;
      if (!audio) return;
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);
      const attack = Math.min(0.055, duration * 0.38);
      const release = Math.min(0.12, duration * 0.58);
      const releaseStart = Math.max(startTime + attack + 0.012, startTime + duration - release);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + attack);
      gain.gain.setValueAtTime(volume, releaseStart);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.connect(gain);
      gain.connect(audio.destination);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.08);
    }

    function playSound(kind) {
      const audio = startAudio();
      if (!audio) return;
      const now = audio.currentTime;
      if (kind === "invalid") {
        tone(180, 0.14, 0.04, "sine", now);
      } else if (kind === "clear") {
        tone(520, 0.16, 0.05, "sine", now);
        tone(760, 0.2, 0.04, "sine", now + 0.06);
      } else if (kind === "combo") {
        tone(620, 0.16, 0.055, "sine", now);
        tone(820, 0.19, 0.052, "sine", now + 0.06);
        tone(1040, 0.24, 0.042, "sine", now + 0.14);
      }
    }

    function softPad(freqs, startTime, duration = 1.55) {
      for (const freq of freqs) {
        tone(freq, duration, 0.014, "sine", startTime);
        tone(freq * 2, duration * 0.8, 0.004, "sine", startTime + 0.05);
      }
    }

    function startMusic() {
      if (state.musicTimer || !state.audio) return;
      const chords = [
        [262, 330, 392, 523],
        [220, 277, 330, 440],
        [294, 370, 440, 587],
        [196, 247, 294, 392]
      ];
      const bass = [131, 110, 147, 98];
      let bar = 0;
      const playBar = () => {
        if (!state.audio || state.audio.state === "suspended") return;
        const now = state.audio.currentTime + 0.04;
        const index = bar % chords.length;
        softPad(chords[index], now, 1.7);
        tone(bass[index], 1.32, 0.018, "sine", now + 0.02);
        if (bar % 2 === 0) tone(chords[index][3], 0.46, 0.012, "sine", now + 0.54);
        bar += 1;
      };
      playBar();
      state.musicTimer = setInterval(playBar, 1520);
    }

    document.addEventListener("gesturestart", event => event.preventDefault());
    document.addEventListener("dblclick", event => event.preventDefault(), { passive: false });

    createBoard();
    updateUI();
    render();
    resetIdleHint();
  </script>
</body>
</html>
